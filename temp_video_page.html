n’t be sent for human review or used to improve our generative machine-learning models.\u003c/p\u003e \u003cp\u003eDon’t enter confidential information in your labs.google/fx interactions or any data you wouldn’t want a reviewer to see or Google to use to improve our products, services, and machine-learning technologies. \u003c/p\u003e"},"faq_accordion_who_data_access_content_history_update":{"message":"\u003cp\u003eWe take your privacy seriously, and we do not sell your personal information to anyone. To help labs.google/fx improve while protecting your privacy, we use automated tools to help remove user identifying information (such as email addresses and phone numbers) from your interactions. These interactions are reviewed by trained reviewers and kept for up to 18 months, separately from your Google Account. Go to \u003cPrivacyPageLink\u003elabs.google/fx Privacy Notice\u003c/PrivacyPageLink\u003e to learn more. \u003c/p\u003e\u003ch4\u003eHow you can control what’s shared with reviewers\u003c/h4\u003e\u003cp\u003eIf you disable labs.google/fx history via each tool's Library, future interactions won’t be sent for human review or used to improve our generative machine-learning models.\u003c/p\u003e \u003cp\u003eDon’t enter confidential information in your labs.google/fx interactions or any data you wouldn’t want a reviewer to see or Google to use to improve our products, services, and machine-learning technologies. \u003c/p\u003e"},"faq_accordion_who_data_access_title":{"message":"Who has access to my data?"},"faq_title":{"message":"FAQ"},"feedback_dialog_description":{"message":"By submitting feedback, you help us improve the experience. Please be as specific as possible."},"feedback_flag_output":{"message":"Flag output"},"filmstrip_thumbnail_alt":{"message":"A thumbnail of your generated media"},"flow_a2ui_image_deleted_label":{"message":"Image has been deleted"},"flow_a2ui_invalid_format":{"message":"Invalid response format"},"flow_a2ui_render_error":{"messag er_label":{"message":"Further"},"pinhole_camera_position_high_label":{"message":"High"},"pinhole_camera_position_label":{"message":"Camera position"},"pinhole_camera_position_left_label":{"message":"Left"},"pinhole_camera_position_low_label":{"message":"Low"},"pinhole_camera_position_right_label":{"message":"Right"},"pinhole_cancel_extend_video_button_label":{"message":"cancel_extend"},"pinhole_cancel_project_text":{"message":"Cancel edit"},"pinhole_cancel_renaming_tile":{"message":"Cancel renaming"},"pinhole_carousel_go_to_banner":{"message":"Go to banner"},"pinhole_changelog_07_22_2025_body":{"message":"\u003cp\u003eHello Flow community! We’ve released a new batch of updates for you:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003eScenebuilder now autosaves your work\u003c/strong\u003e\u003cp\u003eScenebuilder is where you can arrange multiple clips, trim them and build upon them using “jump to” / “extend” features (extend is currently available on Veo 2 only)\u003c/p\u003e\u003cp\u003eWhen you leave your scene, it is now saved for the next time you come back to your project. \u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eText-to-video with Veo 3 now can generate voices for subjects of all ages.\u003c/strong\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003e… and Veo 3 generations without audio now have a “no audio” tag so you can spot them quickly\u003c/strong\u003e\u003cp\u003ePlease remember that Audio is still a beta feature of Veo 3 and may not always generate.\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eBy popular demand, Flow is now live in \u003ca href=\"https://support.google.com/labs/answer/16353544?hl=en\u0026ref_topic=16355608\u0026sjid=14143593637322724886-NA\" target=\"_blank\" rel=\"noopener noreferrer\"\u003e76 additional countries.\u003c/a\u003e \u003c/strong\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eOther updates \u003c/strong\u003einclude a revamped model switch suggestion toast and making the last model you selected sticky across sessions.\u003c/SubHeader\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eThank you and keep feedback coming!\u003c/p\u003e\u003cp\u003e- The Flow Team.\u003c/p\u003e"},"pinhole_changelog_07_22_2025_title":{"message":"Flow 7/22/25 Update"},"pinhole_changelog_dialog_button_label":{"message":"Get started"},"pinhole_changelog_dialog_title":{"message":"Latest Flow Update"},"pinhole_changelogs_page_link_button_label":{"message":"View all changelogs"},"pinhole_character_max_audio_reached":{"message":"Maximum audio ingredients reached ({{count}} allowed)"},"pinhole_character_max_image_references_reached":{"message":"Maximum image ingredients reached ({{count}} allowed)"},"pinhole_clear_prompt_label":{"message":"Clear prompt"},"pinhole_clear_search_label":{"message":"Clear search"},"pinhole_close_search_label":{"message":"Close search"},"pinhole_collapse_prompt_button":{"message":"Collapse prompt"},"pinhole_collection_media_alt":{"message":"A piece of media generated or uploaded by you, that is present in your collection."},"pinhole_confirm_renaming_tile":{"message":"Confirm renaming"},"pinhole_context_menu_add_to_prompt_label":{"message":"Add to prompt"},"pinhole_context_menu_add_to_scene_label":{"message":"Add to scene"},"pinhole_context_menu_add_to_scene_non_8s_tooltip":{"message":"Only videos 8 seconds in length can be added to the Scene Builder at this time"},"pinhole_context_menu_archive_label":{"message":"Move to trash"},"pinhole_context_menu_copy_label":{"message":"Copy"},"pinhole_context_menu_create_character_label":{"message":"Create Character"},"pinhole_context_menu_create_collection_label":{"message":"Create Collection"},"pinhole_context_menu_create_scene_label":{"message":"Create Scene"},"pinhole_context_menu_cut_label":{"message":"Cut"},"pinhole_context_menu_delete_label":{"message":"Delete"},"pinhole_context_menu_download_label":{"message":"Download"},"pinhole_context_menu_duplicate_label":{"message":"Duplicate"},"pinhol message":"Failed to copy image"},"pinhole_failed_to_copy_scene":{"message":"Failed to copy scene"},"pinhole_failed_to_copy_video":{"message":"Failed to copy video"},"pinhole_failed_to_copy_workflow":{"message":"Failed to copy workflow"},"pinhole_failed_to_update_workflow_archive_status":{"message":"Failed to update workflow's trash status"},"pinhole_faq_accordion_button_group_label":{"message":"Accordion Control Button Group"},"pinhole_faq_available_google_one_content":{"message":"\u003cp\u003eFlow is available exclusively for Google AI Pro and Ultra subscribers. Ultra subscribers also get first access to our latest models and features like Ingredients to Video. \u003cGoogleOneLink\u003eLearn more here\u003c/GoogleOneLink\u003e.\u003c/p\u003e"},"pinhole_faq_available_google_one_title":{"message":"Available exclusively for Google AI subscribers"},"pinhole_faq_best_experienced_content":{"message":"Flow is currently best experienced on desktop with a Chromium-based browser, like Google Chrome. We'll be optimizing the experience for other browsers and mobile surfaces shortly, bear with us!"},"pinhole_faq_best_experienced_title":{"message":"Best experienced on Desktop, Chromium browsers"},"pinhole_faq_best_practices_ask_for_help":{"message":"It's early days for Flow. If you get blocked or find a mistake anywhere - please do share feedback with the flag button in the three dot menu so we can iterate on it. We value your input!"},"pinhole_faq_best_practices_conflicting_guidance_content":{"message":"\u003cp\u003eYour text prompts should reference the frames or ingredients you’re pointing to. In Ingredients to Video specifically, you can point to either a style or up to three subjects, locations or objects.\u003c/p\u003e\u003cp\u003eMake sure:\u003c/p\u003e\u003cul\u003e\u003cli\u003eLocation, style references avoid extra subjects (unless desired)\u003c/li\u003e\u003cli\u003eYou have a consistent look across ingredients to help with blending\u003c/li\u003e\u003c/ul\u003e"},"pinhole_faq_best_practices_conflicting_guidance_title":{"message":"Avoid conflicting guidance"},"pinhole_faq_best_practices_content":{"message":"Here are three things to remember to get the best out of Flow"},"pinhole_faq_best_practices_gemini_content":{"message":"\u003cp\u003eIterate on your prompt with Gemini! As a Google AI Pro subscriber, you get access to the most capable Gemini models. Visit \u003cGeminiLink\u003egemini.google.com\u003c/GeminiLink\u003e and send Gemini your prompt, an image, or even video and ask it to write you a new prompt, riff on ideas, and more.\u003c/p\u003e"},"pinhole_faq_best_practices_gemini_title":{"message":"Don't hesitate to ask Gemini for help, too!"},"pinhole_faq_best_practices_ingredients_content":{"message":"\u003cp\u003eClean ingredients make it easier for the model to capture what you care about. When you’re using Ingredients to Video and add a subject or product reference,  it can help if they are on a plain or segmented background.\u003c/p\u003e"},"pinhole_faq_best_practices_ingredients_title":{"message":"Prepare your ingredients"},"pinhole_faq_best_practices_title":{"message":"How do you get the most out of Flow?"},"pinhole_faq_flows_capabilities":{"message":"What are Flow's capabilities?"},"pinhole_faq_how_it_works_clips_content":{"message":"\u003cul\u003e\u003cli\u003eText to Video = Generate using a text prompt\u003c/li\u003e\u003cli\u003eFrames to Video = Upload or generate images to use as starting and/or ending frames\u003c/li\u003e\u003cli\u003eIngredients to Video = Upload or generate images to use as subject or style references\u003c/li\u003e\u003c/ul\u003e"},"pinhole_faq_how_it_works_clips_title":{"message":"Generate clips using Text to Video, Frames to Video, or Ingredients to Video."},"pinhole_faq_how_it_works_project_content":{"message":"This is where your clips will live. Come back to a project to find all your prompts and videos."},"pinhole_faq_how_it_works_project_title":{"message":"Thinking of a scene? Create a project for it."},"pinhole_faq_how_it_works_question":{"message":"How does Flow work?"},"pinhole_faq_how_it_works_scenebuilder_content":{"message":"\u003cp\u003eOnce you find a clip you like, you can add it to Scenebuilder to easily create the next shot(s) with the power of Gemini behind the scenes to help with consistency\u003c/p\u003e\u003cul\u003e\u003cli\u003eExtend = continue the action seamlessly. Flow takes the last 24 frames of your generation into account to smoothly continue the shot. \u003c/li\u003e\u003cli\u003eJump to = transition to a new shot while preserving context from the last frame. This allows you to put a character in a new situation for example, while keeping the look and feel of the previous shot. \u003c/li\u003e\u003c/ul\u003e \u003cp\u003eTip: The scenebuilder resets when you leave your project, but you can always find all your clips in the clips view. We'll add a scenebuilder saved state soon.\u003c/p\u003e"},"pinhole_faq_how_it_works_scenebuilder_title":{"message":"Decide what happens next in Scenebuilder."},"pinhole_faq_how_it_works_share_answer":{"message":"\u003cp\u003eWhen you're done generating your scene, download it! Additionally, upscale your clips to 1080p or download as GIFs for easy sharing.\u003c/p\u003eTip: Not done yet? All clips and prompts will be saved as a Project for you to return to later."},"pinhole_faq_how_it_works_share_question":{"message":"Share your masterpiece"},"pinhole_faq_how_to_use_camera_controls_answer":{"message":"As part of Frames to Video, you can add a camera motion for more control. Currently this only applies for the first frame or first and last frame."},"pinhole_faq_how_to_use_camera_controls_question":{"message":"How do I use Camera Controls?"},"pinhole_faq_join_flow_community_answer":{"message":"If you want to share your work or connect with like-minded creatives, join the #Flow channel in our \u003cDiscordLink\u003eDiscord\u003c/DiscordLink\u003e."},"pinhole_faq_join_flow_community_question":{"message":"How do I join the Flow community?"},"pinhole_faq_languages_supported_answer":{"message":"Flow currently only supports English prompts, with more coming soon."},"pinhole_faq_languages_supported_question":{"message":"What languages does Flow support?"},"pinhole_faq_more_answer":{"message":"For information about your user data and more, please check out \u003cLabsFAQLink\u003elabs.google/fx's FAQ\u003c/LabsFAQLink\u003e."},"pinhole_faq_more_question":{"message":"More"},"pinhole_faq_r2v_after_alt_text":{"message":"Subject image without background"},"pinhole_faq_r2v_before_alt_text":{"message":"Subject image with background"},"pinhole_faq_safety_policies_answer":{"message":"\u003cp\u003eWe want the Flow experience to be fun and safe, therefore, we prohibit users from knowingly generating harmful, illegal, or inappropriate content. For example, Flow features precautions to protect minors and certain queries might not be generated. For more details on categories of content and our policies, please see our \u003cGenAIPolicyLink\u003eGenerative AI Prohibited Use Policy\u003c/GenAIPolicyLink\u003e.\u003c/p\u003e\u003cp\u003eIf you're facing difficulties or getting blocked in ways that were unexpected please do send us feedback by flagging output or the in-app feedback (three-dot menu at the top right) and help make our product better!\u003c/p\u003e"},"pinhole_faq_safety_policies_question":{"message":"What are the Flow user policies?"},"pinhole_faq_table_alt":{"message":"Table showing Flow's capabilities, mainly that the Fast model (powered by Veo 2) is capable of almost everything but is bested at a few things by the Quality model (powered by Veo 2) and Highest Quality model (powered by Veo 3)."},"pinhole_faq_thank_you":{"message":"Thank you for trying Flow!"},"pinhole_faq_title":{"message":"Flow Help Center"},"pinhole_faq_what_are_ai_credits_answer":{"message":"See details on how to use AI Credits, how much they are worth, and more in the \u003cManageAiCredits\u003eGoogle One Help Center\u003c/ManageAiCredits\u003e."},"pinhole_faq_what_are_ai_credits_question":{"message":"What are AI Credits?"},"pinhole_faq_what_is_flow_content":{"message":"Built with and for creatives, Flow is the only AI filmmaking tool custom-designed for Google Deepmind's most advanced models - Veo, Imagen and Gemini. With Flow, storytellers can create cinematic clips, seamlessly transition them into scenes, and have enough consistency to tell a story. Simply prompt how you speak, craft your narratives, and easily organize all of your videos and prompts in one place."},"pinhole_faq_what_is_flow_title":{"message":"What is Flow?"},"pinhole_faq_what_is_flow_tv_content":{"message":"\u003cp\u003e\u003cFlowTvLink\u003eGoogle Flow TV\u003c/FlowTvLink\u003e is an ever-growing showcase of clips, channels, and content generated with Google's Veo generative model. Use the remote control at the bottom of the screen to browse Channels and see the prompt behind the clip. \u003c/p\u003e\u003cp\u003eHit the Home button to visit the channel guide or watch short films created using Flow, alongside other tools and techniques. All generations were created with Veo 2.\u003c/p\u003e\u003cp\u003eGoogle Flow TV does not collect your data. For details on Google policies, see our \u003cPrivacyPolicyLink\u003eprivacy policy\u003c/PrivacyPolicyLink\u003e and \u003cTermsOfServiceLink\u003eterms of service.\u003c/TermsOfServiceLink\u003e\u003c/p\u003e\u003cp\u003eGoogle Flow TV visuals were generated by filmmakers and creatives using a variety of techniques. Output will look different with every generation.\u003c/p\u003e"},"pinhole_faq_what_is_flow_tv_title":{"message":"What is Google Flow TV?"},"pinhole_faq_where_is_pinhole_available_answer":{"message":"\u003cp\u003eWe're working to bring Flow to as many people as possible. See below for a list of countries the site is currently available to 18+ users in.\u003c/p\u003e\u003cp\u003eAmerican Samoa, Angola, Antigua and Barbuda, Argentina, Australia, Bahamas, Belize, Benin, Bolivia, Botswana, Brazil, Burkina Faso, Cabo Verde, Cambodia, Cameroon, Canada, Chile, Côte d'Ivoire, Colombia, Costa Rica, Dominican Republic, Ecuador, El Salvador, Fiji, Gabon, Ghana, Guam, Guatemala, Honduras, Jamaica, Japan, Kenya, Laos, Malaysia, Mali, Mauritius, Mexico, Mozambique, Namibia, Nepal, New Zealand, Nicaragua, Niger, Nigeria, Northern Mariana Islands, Pakistan, Palau, Panama, Papua New Guinea, Paraguay, Peru, Philippines, Puerto Rico, Rwanda, Senegal, Seychelles, Sierra Leone, Singapore, South Africa, South Korea, Sri Lanka, Tanzania, Tonga, Trinidad and Tobago, Türkiye, U.S. Virgin Islands, Uganda, United Kingdom, United States, Uruguay, Venezuela, Zambia, and Zimbabwe.\u003c/p\u003e"},"pinhole_faq_where_is_pinhole_available_question":{"message":"Where is it available?"},"pinhole_faq_where_videofx_generations_answer":{"message":"If you were a previous Early Access user of VideoFX and your history is enabled, your generations are in My Library. Click on your profile icon in the top right then select My Library from the dropdown."},"pinhole_faq_where_videofx_generations_question":{"message":"Where are my VideoFX generations?"},"pinhole_faq_why_switched_to_compatible_model_answer":{"message":"\u003cp\u003eAs described above, we offer three tiers of models (Fast, Quality, Highest Quality) but some features only exist for certain models.\u003c/p\u003e\u003cp\u003eIf we detect you’re trying to use a feature that is not available in your selection, we’ll default you to a compatible model. You can check the model and related credit costs in settings before confirming.\u003c/p\u003e"},"pinhole_faq_why_switched_to_compatible_model_question":{"message":"Why did I get switched to a compatible model?"},"pinhole_faq_will_my_generations_include_watermark_answer":{"message":"\u003cp\u003eAll outputs generated in Flow using Veo and Imagen include invisible \u003ca\u003eSynthID\u003c/a\u003e watermarks. SynthID identifies AI-generated content by embedding digital watermarks directly into AI-generated content.\u003c/p\u003e\u003cp\u003eAs an additional step to help people identify AI-generated content, videos generated by Google AI Pro users will contain a visible watermark indicating the content was made with Veo. Videos generated by Google One Ultra users will not contain this visible watermark.\u003c/p\u003e"},"pinhole_faq_will_my_generations_include_watermark_question":{"message":"Will my generations contain a watermark?"},"pinhole_feature_disabled_tooltip_label":{"message":"Available to Google AI subscribers only"},"pinhole_file_upload_error_size":{"message":"Reduce image size to smaller than {{size}}."},"pinhole_file_upload_error_type":{"message":"Unsupported image type. Please upload a: {{files}}."},"pinhole_fill_frame_label":{"message":"Fill Frame"},"pinhole_filter_aspect_ratio_label":{"message":"Aspect Ratio"},"pinhole_filter_by_4s_label":{"message":"4s"},"pinhole_filter_by_6s_label":{"message":"6s"},"pinhole_filter_by_8s_label":{"message":"8s"},"pinhole_filter_by_favorited_label":{"message":"Favorited"},"pinhole_filter_by_favorites_label":{"message":"Favorites"},"pinhole_filter_by_freeform_label":{"message":"Freeform"},"pinhole_filter_by_generated_label":{"message":"Generated"},"pinhole_filter_by_label":{"message":"Filter by"},"pinhole_filter_by_landscape_label":{"message":"Landscape"},"pinhole_filter_by_portrait_label":{"message":"Portrait"},"pinhole_filter_by_uploaded_label":{"message":"Uploaded"},"pinhole_filter_clear_button":{"message":"Clear"},"pinhole_filter_created_label":{"message":"Created"},"pinhole_filter_duration_label":{"message":"Duration"},"pinhole_filter_results_count_one":{"message":"{{count}} Result"},"pinhole_filter_results_count_other":{"message":"{{count}} Results"},"pinhole_filter_type_label":{"message":"Type"},"pinhole_filters_header_label":{"message":"Filters"},"pinhole_first_frame_button_text":{"message":"First Frame"},"pinhole_first_frame_label":{"m ,"privacy_notice_menu_item":{"message":"Privacy Notice"},"privacy_page_content":{"message":"\u003ch2\u003eYour data and labs.google/fx\u003c/h2\u003e\u003cp\u003eThis notice and our \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\"\u003ePrivacy Policy\u003c/a\u003e describe how Google handles your data when you interact with labs.google/fx. Please read them carefully.\u003c/p\u003e\u003cp\u003eGoogle collects your labs.google/fx interactions, tool outputs, related product usage information, and your feedback. Google uses this data, consistent with our \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\"\u003ePrivacy Policy\u003c/a\u003e, to provide, improve, and develop Google products and services and machine learning technologies, including Google’s enterprise products such as Google Cloud.\u003c/p\u003e\u003cp\u003eBy default Google stores your labs.google/fx history for up to 18 months.\u003c/p\u003e\u003cp\u003eTo help with quality and improve our products (such as generative machine-learning models that power labs.google/fx), human reviewers read, annotate, and process your labs.google/fx interactions and tool outputs. We take steps to protect your privacy as part of this process. This includes disconnecting your conversations, interactions and tool outputs from your Google Account before reviewers see or annotate them. \u003cstrong\u003ePlease don’t enter confidential information in your conversations or interactions or any data you wouldn’t want a reviewer to see or Google to use to improve our products, services, and machine-learning technologies.\u003c/strong\u003e\u003c/p\u003e\u003ch2\u003eConfiguring your settings\u003c/h2\u003e\u003cp\u003eIf you want to use labs.google/fx without saving your interactions and tool outputs, you can disable history by switching off the “Enable Library” toggle in the menu. You can review your interactions and tool outputs or delete them at \u003ca href=\"https://labs.google/fx/library\" target=\"_blank\"\u003ehttps://labs.google/fx/library\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eConversations that have been reviewed or annotated by human reviewers (and related data like your language or feedback) are not deleted when you delete your labs.google/fx history because they are kept separately and are not connected to your Google Account. Instead, they are retained for up to 18 months.\u003c/p\u003e\u003cp\u003eEven when labs.google/fx history is disabled, your interactions and tool outputs will be saved with your account for up to 72 hours. This lets Google provide the service and process any feedback. This activity won’t appear in your labs.google/fx library. \u003ca href=\"https://labs.google/fx/posts/faq\" target=\"_blank\"\u003eLearn more\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eIf you disable or delete your labs.google/fx history, other settings may continue to save data as part of your use of other Google services.\u003c/p\u003e\u003cp\u003eYou can \u003ca href=\"https://support.google.com/legal/answer/3110420?visit_id=637939486089565735-343938859\" target=\"_blank\"\u003erequest\u003c/a\u003e for the removal of content under our policies or applicable laws. You can also export your information by emailing \u003ca href='mailto:ai-test-kitchen-data-export@google.com'\u003eai-test-kitchen-data-export@google.com\u003c/a\u003e\u003c/p\u003e\u003cp\u003eSee \u003ca href=\"https://labs.google/fx/posts/faq\" target=\"_blank\"\u003elabs.google/fx FAQ\u003c/a\u003e to learn more.\u003c/p\u003e\u003ch2\u003eThings to know\u003c/h2\u003e\u003cul\u003e\u003cli\u003elabs.google/fx is an experimental technology and may sometimes give inaccurate information, including about people, or inappropriate information that doesn’t represent Google’s views. Double-check tool responses.\u003c/li\u003e\u003cli\u003eDon’t rely on labs.google/fx’s outputs as medical, legal, financial, or other professional advice.\u003c/li\u003e\u003cli\u003eYou can give feedback by clicking the flag icon to make labs.google/fx better.\u003c/li\u003e\u003c/ul\u003e"},"privacy_page_content_flow_v1":{"message":"\u003cp\u003eThis notice is effective on May 19, 2026.\u003c/p\u003e\u003ch2\u003eYour data and Google Flow\u003c/h2\u003e\u003cp\u003eThis notice and our \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\"\u003ePrivacy Policy\u003c/a\u003e describe how Google handles your data when you interact with Google Flow. Please read them carefully.\u003c/p\u003e\u003cp\u003eWhen you use Google Flow, Google collects your Google Flow interactions, uploads, generated output, related feature usage information, and your feedback. Google uses this data, consistent with our \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\"\u003ePrivacy Policy\u003c/a\u003e, to provide, improve, and develop Google products and services and machine learning technologies. By default, Google stores your prompts, uploads, projects, generated outputs including images, videos, and tools, and associated metadata until you delete them. By default, Google stores your sessions with the Agent and Tools for 18 months.\u003c/p\u003e\u003cp\u003eTo help with quality and improve our products, human reviewers read, annotate, and process a sample of your data. We take steps to protect your privacy as part of this process. This includes disconnecting your uploads and tool outputs from your Google Account before reviewers see or annotate them. \u003cstrong\u003ePlease don’t submit confidential information or any data you wouldn’t want a reviewer to see or Google to use to improve our products, services, and machine-learning technologies.\u003c/strong\u003e\u003c/p\u003e\u003ch2\u003eConfiguring your settings\u003c/h2\u003e\u003cp\u003eIf you want to use Google Flow without your data being used to help with quality and improve our products, you can do so by toggling off “Help improve Flow” in the main menu.\u003c/p\u003e\u003cp\u003eConversations that have been reviewed or annotated by human reviewers (and related data like your language or feedback) are not deleted when you delete your data or when you toggle off “Help improve Flow” because they are kept separately and are not connected to your Google Account. Instead, they are retained for up to 18 months.\u003c/p\u003e\u003cp\u003eYou can review or delete your \u003cstrong\u003eprojects\u003c/strong\u003e at any time by selecting “Delete all projects” in the main menu, or selecting “Delete” on any individual Project. \u003cstrong\u003eNote outputs and sessions with the Agent or Tools are separate, and need to be deleted\u003c/strong\u003e individually by selecting their respective 3-dot menu and choosing Delete. Even after you delete your data, it may be saved with your account for up to 72 hours. This lets Google provide the service and process any feedback. This activity won’t appear within the Google Flow tool.\u003c/p\u003e\u003cp\u003eIf you delete your Google Flow data, other settings may continue to save data as part of your use of other Google services.\u003c/p\u003e\u003cp\u003eYou can \u003ca href=\"https://support.google.com/legal/answer/3110420?visit_id=637939486089565735-343938859\" target=\"_blank\"\u003erequest\u003c/a\u003e for the removal of content under our policies or applicable laws. You can also export your information by emailing \u003ca href='mailto:ai-test-kitchen-data-export@google.com'\u003eai-test-kitchen-data-export@google.com\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eSee the \u003ca href=\"https://support.google.com/flow#topic=16908930\" target=\"_blank\"\u003eGoogle Flow Help Center\u003c/a\u003e to learn more.\u003c/p\u003e\u003ch2\u003eThings to know\u003c/h2\u003e\u003cul\u003e\u003cli\u003eGoogle Flow is continuously evolving and may produce inaccurate or offensive information (including about people) that doesn’t represent Google’s views. Double check responses.\u003c/li\u003e\u003cli\u003eDon’t rely on responses from Google Flow for diagnosis, treatment, or medical, legal, financial, or other professional advice.\u003c/li\u003e\u003cli\u003eYou can give feedback at any time by selecting the three-dot menu next to any output and selecting the “Flag Output” option.\u003c/li\u003e\u003c/ul\u003e"},"privacy_page_content_history_update":{"message":"\u003ch2\u003eYour data and labs.google/fx\u003c/h2\u003e\u003cp\u003eThis notice and our \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\"\u003ePrivacy Policy\u003c/a\u003e describe how Google handles your data when you interact with labs.google/fx. Please read them carefully.\u003c/p\u003e\u003cp\u003eGoogle collects your labs.google/fx interactions, tool outputs, related product usage information, and your feedback. Google uses this data, consistent with our \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\"\u003ePrivacy Policy\u003c/a\u003e, to provide, improve, and develop Google products and services and machine learning technologies, including Google’s enterprise products such as Google Cloud.\u003c/p\u003e\u003cp\u003eBy default Google stores your labs.google/fx history for up to 18 months.\u003c/p\u003e\u003cp\u003eTo help with quality and improve our products (such as generative machine-learning models that power labs.google/fx), human reviewers read, annotate, and process your labs.google/fx interactions and tool outputs. We take steps to protect your privacy as part of this process. This includes disconnecting your conversations, interactions and tool outputs from your Google Account before reviewers see or annotate them. \u003cstrong\u003ePlease don’t enter confidential information in your conversations or interactions or any data you wouldn’t want a reviewer to see or Google to use to improve our products, services, and machine-learning technologies.\u003c/strong\u003e\u003c/p\u003e\u003ch2\u003eConfiguring your settings\u003c/h2\u003e\u003cp\u003eIf you want to use labs.google/fx without saving your interactions and tool outputs, you can disable history in each tool’s Library by switching off the “Enable History” toggle in the menu. You can review your interactions and tool outputs or delete them within each tool’s Library or delete all of your library data by selecting the \"Delete library data\" button in the menu.\u003c/p\u003e\u003cp\u003eConversations that have been reviewed or annotated by human reviewers (and related data like your language or feedback) are not deleted when you delete your labs.google/fx history because they are kept separately and are not connected to your Google Account. Instead, they are retained for up to 18 months.\u003c/p\u003e\u003cp\u003eEven when labs.google/fx history is disabled, your interactions and tool outputs will be saved with your account for up to 72 hours. This lets Google provide the service and process any feedback. This activity won’t appear in your labs.google/fx library. \u003ca href=\"https://labs.google/fx/posts/faq\" target=\"_blank\"\u003eLearn more\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eIf you disable or delete your labs.google/fx history, other settings may continue to save data as part of your use of other Google services.\u003c/p\u003e\u003cp\u003eYou can \u003ca href=\"https://support.google.com/legal/answer/3110420?visit_id=637939486089565735-343938859\" target=\"_blank\"\u003erequest\u003c/a\u003e for the removal of content under our policies or applicable laws. You can also export your information by emailing \u003ca href='mailto:ai-test-kitchen-data-export@google.com'\u003eai-test-kitchen-data-export@google.com\u003c/a\u003e\u003c/p\u003e\u003cp\u003eSee \u003ca href=\"https://labs.google/fx/posts/faq\" target=\"_blank\"\u003elabs.google/fx FAQ\u003c/a\u003e to learn more.\u003c/p\u003e\u003cp\u003eIf you are a signed-in Workspace user, Google does not use your data to train Google’s generative AI models. If you choose to provide feedback, Google can use that feedback to improve its services. //support.google.com/legal/answer/3110420?visit_id=637939486089565735-343938859\" target=\"_blank\"\u003erequest\u003c/a\u003e for the removal of content under our policies or applicable laws. You can also export your information by emailing \u003ca href='mailto:ai-test-kitchen-data-export@google.com'\u003eai-test-kitchen-data-export@google.com\u003c/a\u003e\u003c/p\u003e\u003cp\u003eSee \u003ca href=\"https://labs.google/fx/posts/faq\" target=\"_blank\"\u003elabs.google/fx FAQ\u003c/a\u003e to learn more.\u003c/p\u003e\u003cp\u003eIf you are a signed-in Workspace user, Google does not use your data to train Google’s generative AI models. If you choose to provide feedback, Google can use that feedback to improve its services. \u003c/p\u003e\u003ch2\u003eThings to know\u003c/h2\u003e\u003cul\u003e\u003cli\u003elabs.google/fx is an experimental technology and may sometimes give inaccurate information, including about people, or inappropriate information that doesn’t represent Google’s views. Double-check tool responses.\u003c/li\u003e\u003cli\u003eDon’t rely on labs.google/fx’s outputs as medical, legal, financial, or other professional advice.\u003c/li\u003e\u003cli\u003eYou can give feedback by clicking the flag icon to make labs.google/fx better.\u003c/li\u003e\u003c/ul\u003e"},"privacy_page_title":{"message":"Privacy Notice"},"project_picker_cancel":{"message":"Cancel"},"project_picker_open":{"message":"Open"},"project_picker_title":{"message":"Open In Project"},"promptdj_about_content_body":{"message":"\u003cp\u003eMusicFX DJ lets you input multiple prompts to shape the music in real-time and create an evolving soundscape. This experimental technology is powered by Google's MusicLM and uses Google DeepMind’s novel watermarking technology, SynthID, to embed a digital watermark in the music. Certain queries that mention specific artists or include vocals will not be generated.\u003c/p\u003e\u003ch3\u003eHow to use MusicFX DJ\u003c/h3\u003e\u003cimg src=\"https://www.gstatic.com/aitestkitchen/website/season-3/promptdj_about1.gif\" alt=\"How to use MusicFX DJ\"\u003e\u003cp\u003eSteer the music by adding up to 10 prompts like genres, instruments, or emotions. Use the sliders to adjust how much that prompt impacts the music and press “reset” when you want a fresh start to the music. It may take a few seconds for the music to adjust to changes you make to prompts and controls and the timeline will show when your changes take effect.\u003c/p\u003e\u003cimg src=\"https://www.gstatic.com/aitestkitchen/website/season-3/promptdj_about2.gif\" alt=\"How to use MusicFX DJ Timeline\"\u003e\u003cp\u003eExperiment with controls including:\u003c/p\u003e\u003cul\u003e\u003cli\u003eDensity: make the music smooth or punchy\u003c/li\u003e\u003cli\u003eBrightness: adjust the tone\u003c/li\u003e\u003cli\u003eChaos: make the music random or repetitive\u003c/li\u003e\u003cli\u003eDrums, bass, and other: mute specific instruments\u003c/li\u003e\u003cli\u003eBPM: set the tempo (restarts the music)\u003c/li\u003e\u003cli\u003eKey: set the key center (restarts the music)\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eShare your creations with others by using the “share” button to the right of the timeline. Anyone with the URL can playback up to 60 seconds of your session and use your creation as a starting point to make something new.\u003c/p\u003e\u003ch3\u003eOther details\u003c/h3\u003e\u003cp\u003eSince MusicFX DJ is in high-demand, sessions are limited to 60 minutes and will automatically end if you’re inactive for more than 10 minutes.\u003c/p\u003e"},"promptdj_about_title":{"message":"About MusicFX DJ"},"promptdj_add_prompt_tooltip":{"message":"Add random prompt"},"promptdj_adv_controls_auto":{"message":"Auto"},"promptdj_adv_controls_bpm":{"message":"BPM"},"promptdj_adv_controls_brightness":{"message":"Brightness"},"promptdj_adv_controls_chaos":{"message":"Chaos"},"promptdj_adv_controls_density":{"message":"Density"},"promptdj_adv_controls_high":{"mes olbox"},"trusted_tester_t_and_s_accept_button_text":{"message":"Accept"},"trusted_tester_t_and_s_title":{"message":"TRUSTED TESTER AGREEMENT"},"trusted_tester_t_and_s_v1":{"message":"\u003cp\u003eThis Trusted Tester Agreement (the \"\u003cstrong\u003eAgreement\u003c/strong\u003e\") is between Google LLC, with offices at 1600 Amphitheatre Parkway, Mountain View, California 94043, USA (\"\u003cstrong\u003eGoogle\u003c/strong\u003e\") and the entity or person accepting these terms (\"\u003cstrong\u003eyou\u003c/strong\u003e\"). This Agreement is effective as of the date you click-accept it (the \"\u003cstrong\u003eEffective Date\u003c/strong\u003e\").\u003c/p\u003e\u003cp\u003eIf you are accepting this Agreement on behalf of an entity or organization, then you represent and warrant that: (i) you have full legal authority to bind that entity or organization to this Agreement; (ii) you have read and understand this Agreement; (iii) you agree, on behalf of that entity or organization, to this Agreement; and (iv) the entity or organization is not a government agency or public university.\u003c/p\u003e\u003ch3\u003eTesting Program\u003c/h3\u003e\u003cp\u003eBy accepting these Terms, you agree to participate in Google’s testing and development program(s) (each, a \"\u003cstrong\u003eTesting Program\u003c/strong\u003e\") to help Google improve its products for you and other Google users. This may include giving you access to certain pre-release products that are not yet suitable for use in a production environment, including but not limited to, the Flow generative AI video creation pre-release product, the ImageFX generative AI image creation pre-release features, the MusicFX generative AI music creation pre-release and their Output (each, a \"\u003cstrong\u003eTest Product\"\u003c/strong\u003e). If you choose to participate under these Terms, Google may contact you (including by email or phone) regarding the Testing Program. You will use one or more tools in the Test Product
