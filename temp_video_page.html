bit users from knowingly generating certain \u003ca href=\"https://policies.google.com/terms/generative-ai/use-policy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ecategories of content.\u003c/a\u003e\u003c/p\u003e\u003cbr\u003e\u003cp\u003eWhisk features precautions to protect minors so certain queries that could lead to outputs of children will not be generated. Additionally, certain queries that could lead to outputs of prominent people will also not be generated.\u003c/p\u003e\u003cbr\u003e\u003cp\u003eSee our \u003cFAQLink\u003eHelp Center / FAQ\u003c/FAQLink\u003e to learn more about the tool, how it works, and how to use it!\u003c/p\u003e"},"backbone_about_title":{"message":"About Whisk"},"backbone_add_image_a11y_label":{"message":"Add new category"},"backbone_add_image_back_a11y_label":{"message":"Hide categories"},"backbone_add_image_inspire":{"message":"Inspire Me"},"backbone_add_image_label":{"message":"Add more"},"backbone_add_image_label_mobile":{"message":"Add image"},"backbone_analyze_image_title":{"message":"analyzing image…"},"backbone_animate_high_traffic_error_msg":{"message":"Oops, lots of people are trying to animate right now! Please try again soon. You can still generate images."},"backbone_aspect_ratio_i2v_error_msg":{"message":"Unable to generate videos in this aspect ratio. Change the aspect ratio and try again!"},"backbone_audio_failure_generic":{"message":"We couldn't generate audio for this video. Please try again."},"backbone_audio_failure_minor":{"message":"Audio wasn't generated. We don't support speech generation for minors yet."},"backbone_brand_version_text":{"message":"Experiment"},"backbone_category_scene":{"message":"Scene"},"backbone_category_style":{"message":"Style"},"backbone_category_subject":{"message":"Subject"},"backbone_create_project_button":{"message":"Create new project"},"backbone_danger_failure":{"message":"This prompt might violate our \u003cPolicyLink\u003epolicies\u003c/PolicyLink\u003e about generating harmful content. Please try a different prompt or send feedback."},"backbone_delete_a11y_label":{"message":"Delete image"},"backbone_delete_label":{"message":"Delete"},"backbone_download_a11y_label":{"message":"Download image"},"backbone_download_card_label":{"message":"Download Card"},"backbone_download_label":{"message":"Download"},"backbone_edit_image_history_panel_header":{"message":"History"},"backbone_edit_image_title":{"message":"Not seeing what you expected?"},"backbone_edit_modal_disclaimer":{"message":"Whisk may be inaccurate. \u003cFaqLink\u003eLearn More\u003c/FaqLink\u003e."},"backbone_edit_prompt_text":{"message":"Add or edit details"},"backbone_enter_text_title":{"message":"Enter text"},"backbone_enter_tool_button":{"message":"Enter tool"},"backbone_enter_tool_button_short":{"message":"Enter"},"backbone_error_drop_file_type":{"message":"This type of file can not be turned into asset"},"backbone_error_empty_prompt":{"message":"Prompt can not be empty'"},"backbone_error_empty_prompt_or_asset":{"message":"Please select at least one asset or add a prompt to proceed"},"backbone_error_headline":{"message":"Sorry, we can't seem to find this content."},"backbone_faq_age_verification":{"message":"See our \u003cFaqLink\u003eHelp Center\u003c/FaqLink\u003e for more information on who can access Whisk."},"backbone_faq_answer_1":{"message":"That’s expected. This experiment does \u003cem\u003enot\u003c/em\u003e support identity preservation. Whisk will \u003cem\u003etry\u003c/em\u003e to understand the key features of the subject - as a directional reference - but not fully replicate. You can always edit descriptions manually if you’d like to refine the result further or fix. For example, skin tone or gender."},"backbone_faq_answer_15":{"message":"Yes, just click on the download icon to save and share or generate a share link. We’d also love to see what you create, please share with us through our \u003cDiscordLink\u003eDiscord channel\u003c/DiscordLink\u003e too!"},"backbone_faq_answer_how_does_whisk_work":{"message":"\u003cp\u003eIn order to remix elements from different images together, we first need to develop an understanding of each image you reference. This is where Gemini’s multi-modal understanding comes in! When you upload an image, Whisk uses Gemini to visually understand those images and generate text descriptions (or captions) about them. Or in other words, translate that image to text (I2T). These descriptions are meant to capture the essence of your references, not to replicate the original, to facilitate remixing ideas. \u003c/p\u003e\u003cp\u003eThese captions are then used to write a detailed prompt to generate an image based on your guidance using our latest and most powerful image generation model, Imagen 3. Or in other words, translating text back to image (T2I). \u003c/p\u003e\u003cp\u003eThis process above helps Whisk better understand and represent the ideas you’re forming, and iterate while conversing with you.\u003c/p\u003e"},"backbone_faq_answer_how_does_whisk_work_with_animate":{"message":"\u003cp\u003eIn order to remix elements from different images together, we first need to develop an understanding of each image you reference. This is where Gemini’s multi-modal understanding comes in! When you upload an image, Whisk uses Gemini to visually understand those images and generate text descriptions (or captions) about them. Or in other words, translate that image to text (I2T). These descriptions are meant to capture the essence of your references, not to replicate the original, to facilitate remixing ideas. \u003c/p\u003e\u003cp\u003eThese captions are then used to write a detailed prompt to generate an image based on your guidance using our latest and most powerful image generation model, Imagen 3. Or in other words, translating text back to image (T2I). \u003c/p\u003e \u003cp\u003eWhisk Animate lets you transform generated images into short videos with Veo 2 by letting you specify motion guidance for your Whisk generated images.\u003c/p\u003e\u003cp\u003eThis process above helps Whisk better understand and represent the ideas you’re forming, and iterate while conversing with you.\u003c/p\u003e"},"backbone_faq_answer_how_does_whisk_work_with_animate_veo3":{"message":"\u003cp\u003eIn order to remix elements from different images together, we first need to develop an understanding of each image you reference. This is where Gemini’s multi-modal understanding comes in! When you upload an image, Whisk uses Gemini to visually understand those images and generate text descriptions (or captions) about them. Or in other words, translate that image to text (I2T). These descriptions are meant to capture the essence of your references, not to replicate the original, to facilitate remixing ideas. \u003c/p\u003e\u003cp\u003eThese captions are then used to write a detailed prompt to generate an image based on your guidance using our latest and most powerful image generation model, Imagen 4. Or in other words, translating text back to image (T2I). \u003c/p\u003e \u003cp\u003eWhisk Animate lets you transform generated images into short videos with Veo 3 by letting you specify motion guidance for your Whisk generated images.\u003c/p\u003e\u003cp\u003eThis process above helps Whisk better understand and represent the ideas you’re forming, and iterate while conversing with you.\u003c/p\u003e"},"backbone_faq_answer_not_character":{"message":"\u003cp\u003eOutputs will only resemble your uploads, not be an exact copy. In our experiment, Whisk extracts only a few key characteristics from the image you provide to guide the model. Our goal is not to create an exact replica, but rather to capture the essence of the subject.\u003c/p\u003e\u003cp\u003eTherefore, the generated image may differ in appearance. For example, the generated subject might be of a different height, weight, or have a different hairstyle or skin tone. We understand that these features may be crucial to the unique identity of your character. To achieve a result closer to your vision, we encourage you to provide more detailed prompts and refine your instructions.\u003c/p\u003e\u003cp\u003eYou can use the top right menu to send us feedback.\u003c/p\u003e"},"backbone_faq_answer_project_saving":{"message":"Yes, you can access your previous generations via the My Library link at the top of the Whisk page. Alternatively, going to \u003cLibraryLink\u003ehttps://labs.google/fx/library\u003c/LibraryLink\u003e and selecting Whisk in the product dropdown list will also show you your past generations. From here, you can edit the project title. You can also delete projects, or specific assets within a project. Deleting a project will delete all assets associated with it. Projects are auto saved, and assets created in a single session are grouped within the same project."},"backbone_faq_answer_project_saving_new_library":{"message":"Yes, you can access your previous generations via the My Library link at the top of the Whisk page. Alternatively, going to \u003cLibraryLink\u003ehttps://labs.google/fx/tools/whisk/library\u003c/LibraryLink\u003e and selecting Whisk in the product dropdown list will also show you your past generations. From here, you can edit the project title. You can also delete projects, or specific assets within a project. Deleting a project will delete all assets associated with it. Projects are auto saved, and assets created in a single session are grouped within the same project."},"backbone_faq_answer_terms_of_use":{"message":"The \u003cTermsOfUseLink\u003eTerms of Service\u003c/TermsOfUseLink\u003e govern how Whisk may be used, and must be consulted and followed in their entirety. Per those terms: Some of our services allow you to generate original content. Google won't claim ownership over that content."},"backbone_faq_answer_what_is_gallery":{"message":"Use our Whisk gallery for inspiration! Discover new ideas for your Whisk creations, pick what you like and remix it by clicking on ‘Make it your own’."},"backbone_faq_answer_what_is_whisk_animate":{"message":"Whisk Animate lets you transform generated images into short videos with Veo 2 by letting you specify motion guidance for your Whisk generated images."},"backbone_faq_answer_what_is_whisk_animate_veo3":{"message":"Whisk Animate lets you transform generated images into short videos with Veo 3 by letting you specify motion guidance for your Whisk generated images."},"backbone_faq_answer_where_available":{"message":"\u003cp\u003eWe’re working to bring our tools to as many people as possible. Whisk is available to 18+ users in all \u003ca href=\"https://labs.google/fx/faq\" target=\"_blank\"\u003elabs.google/fx\u003c/a\u003e countries except the UK.\u003c/p\u003e"},"backbone_faq_answer_where_available_animate":{"message":"\u003cp\u003eWhisk Animate is available in the following countries: American Samoa, Angola, Antigua and Barbuda, Argentina, Australia, Bahamas, Belize, Benin, Bolivia, Botswana, Brazil, Burkina Faso, Cabo Verde, Cambodia, Cameroon, Canada, Chile, Côte d'Ivoire, Colombia, Costa Rica, Dominican Republic, Ecuador, El Salvador, Fiji, Gabon, Ghana, Guam, Guatemala, Honduras, Jamaica, Japan, Kenya, Laos, Malaysia, Mali, Mauritius, Mexico, Mozambique, Namibia, Nepal, New Zealand, Nicaragua, Niger, Nigeria, Northern Mariana Islands, Pakistan, Palau, Panama, Papua New Guinea, Paraguay, Peru, Philippines, Puerto Rico, Rwanda, Senegal, Seychelles, Sierra Leone, Singapore, South Africa, South Korea, Sri Lanka, Tanzania, Tonga, Trinidad and Tobago, Türkiye, U.S. Virgin Islands, Uganda, United States, Uruguay, Venezuela, Zambia, and Zimbabwe.\u003c/p\u003e"},"backbone_faq_answer_where_available_animate_veo3":{"message":"\u003cp\u003eWhisk Animate is available in the following countries: American Samoa, Angola, Antigua and Barbuda, Argentina, Australia, Bahamas, Belize, Benin, Bolivia, Botswana, Brazil, Burkina Faso, Cabo Verde, Cambodia, Cameroon, Canada, Chile, Côte d'Ivoire, Colombia, Costa Rica, Dominican Republic, Ecuador, El Salvador, Fiji, Gabon, Ghana, Guam, Guatemala, Honduras, Jamaica, Japan, Kenya, Laos, Malaysia, Mali, Mauritius, Mexico, Mozambique, Namibia, Nepal, New Zealand, Nicaragua, Niger, Nigeria, Northern Mariana Islands, Pakistan, Palau, Panama, Papua New Guinea, Paraguay, Peru, Philippines, Puerto Rico, Rwanda, Senegal, Seychelles, Sierra Leone, Singapore, South Africa, South Korea, Sri Lanka, Tanzania, Tonga, Trinidad and Tobago, Türkiye, U.S. Virgin Islands, Uganda, United States, Uruguay, Venezuela, Zambia, Zimbabwe, Albania, Algeria, Armenia, Aruba, Austria, Azerbaijan, Bahrain, Bangladesh, Belgium, Bermuda, Bosnia and Herzegovina, Bulgaria, Cayman Islands, Croatia, Cyprus, Czechia, Denmark, Egypt, Estonia, Finland, France, Georgia, Germany, Gibraltar, Greece, Guinea-Bissau, Haiti, Hungary, Iceland, India, Indonesia, Iraq, Ireland, Israel, Italy, Jordan, Kazakhstan, Kuwait, Kyrgyzstan, Latvia, Lebanon, Liechtenstein, Lithuania, Luxembourg, Maldives, Malta, Moldova (Republic of), Monaco, Morocco, Netherlands, North Macedonia, Norway, Oman, Poland, Portugal, Qatar, Romania, San Marino, Saudi Arabia, Serbia, Slovakia, Slovenia, Spain, Sweden, Switzerland, Taiwan, Tajikistan, Thailand, Togo, Tunisia, Turkmenistan, Ukraine, United Arab Emirates, Uzbekistan, Viet Nam, Virgin Islands (British), Yemen.\u003c/p\u003e"},"backbone_faq_answer_where_available_veo3":{"message":"\u003cp\u003eWhisk is available to 18+ users in Albania, Algeria, American Samoa, Angola, Antigua and Barbuda, Argentina, Armenia, Aruba, Australia, Austria, Azerbaijan, Bahamas, Bahrain, Bangladesh, Barbados, Belgium, Belize, Benin, Bermuda, Bhutan, Bolivia, Bosnia and Herzegovina, Botswana, Brazil, Brunei, Bulgaria, Burkina Faso, Burundi, Cabo Verde, Cambodia, Cameroon, Canada, Cayman Islands, Central African Republic, Chile, Christmas Island, Cocos (Keeling) Islands, Colombia, Congo-Brazzaville Republic of the Congo, Congo-Kinshasa Democratic Republic of the Congo, Cook Islands, Costa Rica, Côte d'Ivoire, Croatia, Cyprus, Czechia, Denmark, Dominica, Dominican Republic, Ecuador, Egypt, El Salvador, Equatorial Guinea, Estonia, Eswatini, Ethiopia, Fiji, Finland, France, Gabon, Georgia, Germany, Ghana, Gibraltar, Greece, Grenada, Guam, Guatemala, Guinea, Guinea-Bissau, Guyana, Haiti, Heard Island and McDonald Islands, Honduras, Hungary, Iceland, India, Indonesia, Iraq, Ireland, Israel, Italy, Jamaica, Japan, Jordan, Kazakhstan, Kenya, Kiribati, Kuwait, Kyrgyzstan, Laos, Latvia, Lebanon, Lesotho, Liberia, Liechtenstein, Lithuania, Luxembourg, Madagascar, Malawi, Malaysia, Maldives, Mali, Malta, Mauritius, Mexico, Micronesia, Moldova (Republic of), Monaco, Morocco, Mozambique, Namibia, Nauru, Nepal, Netherlands, New Zealand, Nicaragua, Niger, Nigeria, Niue, Norfolk Island, North Macedonia, Northern Mariana Islands, Norway, Oman, Pakistan, Palau, Panama, Papua New Guinea, Paraguay, Peru, Philippines, Poland, Portugal, Puerto Rico, Qatar, Romania, Rwanda, Saint Kitts and Nevis, Saint Lucia, Saint Vincent and the Grenadines, Samoa, San Marino, São Tomé and Príncipe, Saudi Arabia, Senegal, Serbia, Seychelles, Sierra Leone, Singapore, Slovakia, Slovenia, Solomon Islands, South Africa, South Korea, South Sudan, Spain, Sri Lanka, Sweden, Switzerland, Taiwan, Tajikistan, Tanzania, Thailand, The Gambia, Togo, Tokelau, Tonga, Trinidad and Tobago, Tunisia, Türkiye, Turkmenistan, Tuvalu, U.K., U.S., U.S. Virgin Islands, Uganda, Ukraine, United Arab Emirates, Uruguay, Uzbekistan, Vanuatu, Venezuela, Viet Nam, Virgin Islands (British), Yemen, Zambia, Zimbabwe.\u003c/p\u003e"},"backbone_faq_choose_not_to_share_ingredients_answer":{"message":"Yes. By default, the ingredients (assets) used in your creation are included when you share. However, you have the option to hide these ingredients when you generate the share link."},"backbone_faq_choose_not_to_share_ingredients_question":{"message":"Can I choose not to share the ingredients I used?"},"backbone_faq_click_share_link_answer":{"message":"When someone clicks on a share link, your creation will load directly in their tool. This allows them to view it and start remixing it to make their own version."},"backbone_faq_click_share_link_question":{"message":"What happens when someone clicks on a share link I sent them?"},"backbone_faq_content_1":{"message":"\u003cp\u003eWe believe you shouldn’t have to “learn how to prompt” to create images. It should be easy to try things out, iterate, refine and remix ideas visually. Like you’d do with a friend. So we’re trying something new!\u003c/p\u003e\u003cp\u003eWhisk is labs.google/fx’s latest generative media \u003cunderline\u003eexperiment\u003c/underline\u003e, focusing on fast visual ideation without the need to deeply understand prompting!\u003c/p\u003e\u003cp\u003eJust throw in a couple of images for light guidance (scene, subjects, styles) and Whisk will try to capture their essence to suggest some images for you to keep ideating on. Browse our gallery for inspiration, select what you want to recreate, and add your own spin!\u003c/p\u003e\u003cp\u003eBehind the scenes, the Gemini model automatically writes a detailed caption of your images. It then feeds those descriptions into Google’s latest image generation model.\u003c/p\u003e\u003cp\u003eWhether it’s turning a drawing into a plushie, creating an epic holiday card, or visualizing the beginning of a story… We’re excited to see where Whisk takes you.\u003c/p\u003e"},"backbone_faq_content_2":{"message":"\u003cul\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003ePrepare\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eBring in visual elements for Whisk to analyze and combine. Drag and drop an image, upload it from a folder. You can also create a simple reference from a text prompt, … or have us seed a couple ideas by selecting “inspire me” or using the “roll the dice” features.\u003c/p\u003e\u003cp\u003e\u003cem\u003eBehind the scenes: these assets go through Gemini’s visual understanding for captioning. These text descriptions are what Whisk uses. Click edit to see if we got it right and refine as needed!\u003c/em\u003e\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003eExplore\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eTime to mix things up! You can select assets (1 or more subjects, 1 scene, 1 style) and put them to work. The system will bring those together in creative remixes.\u003c/p\u003e\u003cp\u003eSee what Whisk comes up with, and keep riffing! You can also throw in some light guidance to play around with details and keep your imagination going.\u003c/p\u003e\u003cp\u003e“Make the characters eat ice-cream”\u003cbr /\u003e“The dinosaur and the cat are high fiving!”\u003cbr /\u003e“Make sure the enamel pin is round.”\u003cbr /\u003e“Adjust the color scheme to follow a pastel palette.”\u003c/p\u003e\u003cp\u003e\u003cem\u003eBehind the scenes: Gemini composes prompts from the captions + your guidance to create the prompt for you. Click edit to see what it’s been whispering to the image models.\u003c/em\u003e\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003eRefine\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eSee an image you like but maybe that hat should be blue? Or is it missing a sunset in the background? Enter refine mode and ask for smaller to medium changes that stay directionally close to the original.\u003c/p\u003e\u003cp\u003e\u003cem\u003eBehind the scenes: Gemini updates the prompt based on your guidance! We still regenerate all the pixels from that prompt, but ask the model to stay close.\u003c/em\u003e\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003eDiagnose\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLet’s be honest, things might go in wild directions! Maybe some elements were dropped? Maybe that exact thing you’re looking for just doesn’t match?\u003c/p\u003e\u003cp\u003eAt any stage above you can diagnose the underlying prompts by clicking the prompt button / icon and edit them, add in those critical details manually and ask the model to generate more options. Ultimately, you’re in control :-)\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003eShare\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eLove your final creation? Send it out as a share card for your friends to remix! Click the share icon on your image within the tool to generate a public link.\u003c/p\u003e\u003c/li\u003e\u003c/ul\u003e"},"backbone_faq_content_3":{"message":"\u003cul\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003eSubject\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eThat’s what the image is about! Character, objects or a combination of such. An old rotary phone! A cool chair! A cardboard movie display. A mysterious renaissance vampire. You can also throw yourself in as a \u003cunderline\u003edirectional\u003c/underline\u003e reference and see what comes out :-)\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003eScene\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eWhere the subjects will show up. A fashion runway? A pop up holiday card? You can bring characters in the scene alongside the ones already there; or maybe you can swap them in? Worth trying out.\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003e\u003cstrong\u003eStyle\u003c/strong\u003e\u003c/p\u003e\u003cp\u003eMaybe you want to throw more guidance on the aesthetic, material or technique used to represent the above. Style is for that. Feel free to specify what you care about most in the main prompt box to reinforce that guidance.\u003c/p\u003e\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eYou can refer to them in natural language when you add more details (e.g. “our subjects having a birthday dinner”), and Whisk will try to weave that in.\u003c/p\u003e"},"backbone_faq_content_4":{"message":"\u003cp\u003eWe’re included several ways for you to get a sense for how this works natively in the tool.\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cp\u003ePlayground: our landing page is a simplified experience of the tool for you to feel the magic in one action. Drop in an image and see it transform into a plushie! (or sticker! or enamel pin!)\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eInspire me flow: this button will show when you click “start from scratch”. It’ll pre-populate some assets. Suggest guidance and guide you through the key areas of the main UI to generate your first outputs. Easy!\u003c/p\u003e\u003c/li\u003e\u003cli\u003e\u003cp\u003eDice roll: located at the top of the left panel, it is here to quickly add a few subject, scene, style suggestions to get going… or keep riffing!\u003c/p\u003e\u003c/li\u003e\u003c/ul\u003e"},"backbone_faq_delete_shared_answer":{"message":"\u003cul\u003e\u003cli\u003e\u003cstrong\u003eIf you delete a shared image:\u003c/strong\u003e The share link will no longer show the image. Instead, it will display a message saying the content is no longer available.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eIf you delete an asset (ingredient) that was part of a shared creation:\u003c/strong\u003e The share link will still load, but it will do so without that specific asset.\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eImportant Note:\u003c/strong\u003e If another user has already remixed your shared image before you deleted an asset, they will have a copy of that asset. Deleting your original asset will not remove it from their remixed version.\u003c/li\u003e\u003c/ul\u003e"},"backbone_faq_delete_shared_question":{"message":"What happens if I delete something that I've already shared?"},"backbone_faq_example_text":{"message":"“subject is wearing a chef outfit and giving a thumbs up”"},"backbone_faq_header_1":{"message":"Prompt less, Play more!"},"backbone_faq_how_to_use_precise_mode":{"message":"How do I get started with Precise mode?"},"backbone_faq_how_to_use_precise_mode_answer":{"message":"\u003cp\u003e\u003cul\u003e\u003cli\u003eMake sure “Precise ref” is toggled on in the settings menu on your prompt bar.\u003c/li\u003e \u003cli\u003eYou may select a maximum of three context images (for subject and scene combined) and one style image.\u003c/li\u003e\u003cli\u003eYou must select a minimum of one context image (subject or scene) or one style image.\u003c/li\u003e\u003cli\u003eWe highly recommend providing a text instruction along with your uploaded assets.\u003c/li\u003e\u003cli\u003ePhotorealistic images will be blocked as input for certain categories (e.g., minors) in Precise mode.\u003c/li\u003e\u003cli\u003eFor best results for facial identity preservation, \u003cstrong\u003eusers should upload a cropped, natural color image of their face.\u003c/strong\u003e Users should avoid blurry photos, black and white (or colored lighting) images, non-frontal angles, and multi-subject photos.\u003c/li\u003e\u003c/ul\u003e\u003c/p\u003e\u003cp\u003eGood Input: \u003cGoodInputImage /\u003e\u003c/p\u003e\u003cp\u003eBad Input: \u003cBadInputImage /\u003e\u003c/p\u003e \u003c/p\u003e"},"backbone_faq_identity_answer":{"message":"\u003cp\u003eNo. While Precise mode is designed for better identity preservation, it's important to remember that the outputs are still AI-generated and Whisk won’t always get it right. The model may introduce subtle distortions, alterations, or changes to facial and body features.\u003c/p\u003e\u003cp\u003eWe encourage you to remember that these creations are not a reflection of reality, but rather a fun, experimental output from an AI model. If you encounter any problematic, offensive, or low-quality content, please help us improve and report it by clicking the flag icon on the image output.\u003c/p\u003e"},"backbone_faq_identity_question":{"message":"Is identity preservation guaranteed?"},"backbone_faq_main_content_animate_free_tier_text":{"message":"\u003cp\u003eWhisk Animate lets you transform generated images into short videos with Veo 2. To help you get started, Whisk users in \u003cSupportedCountriesLink\u003eG1 supported countries\u003c/SupportedCountriesLink\u003e \u003cstrong\u003ecan generate 10 free videos each month!\u003c/strong\u003e Please note that this resets every month.\u003c/p\u003e\u003cp\u003eFor those looking to create more videos, subscribe to Google AI Pro or Ultra for an increased generation cap. Similar to the free tier, these subscriber credits also reset every month. If you become a subscriber, your monthly limit is inclusive of the 10 free videos.\u003c/p\u003e"},"backbone_faq_main_content_animate_free_tier_veo3_text":{"message":"\u003cp\u003eWhisk Animate lets you transform generated images into short videos with Veo 3. To help you get started, Whisk users in \u003cSupportedCountriesLink\u003eG1 supported countries\u003c/SupportedCountriesLink\u003e \u003cstrong\u003ecan generate 5 free videos each month!\u003c/strong\u003e Please note that this resets every month.\u003c/p\u003e\u003cp\u003eFor those looking to create more videos, subscribe to Google AI Pro or Ultra for an increased generation cap. Similar to the free tier, these subscriber credits also reset every month. If you become a subscriber, your monthly limit is inclusive of the 5 free videos.\u003c/p\u003e"},"backbone_faq_question_1":{"message":"My subject/character doesn’t look like what I intended?"},"backbone_faq_question_15":{"message":"Can I share my creation?"},"backbone_faq_question_how_does_whisk_work":{"message":"How does Whisk work?"},"backbone_faq_question_not_character":{"message":"That’s not my character - how do I fix it?"},"backbone_faq_question_project_saving":{"message":"Can I access my previous generations?"},"backbone_faq_question_terms_of_use":{"message":"Can I use my creations for commercial purposes?"},"backbone_faq_question_what_is_gallery":{"message":"What is the gallery and how can I use it?"},"backbone_faq_question_what_is_whisk_animate":{"message":"What is Whisk Animate?"},"backbone_faq_question_where_available":{"message":"Where is Whisk available?"},"backbone_faq_question_where_available_animate":{"message":"Where is Whisk Animate available?"},"backbone_faq_section_more_content":{"message":"For information about your user data, user history, our generative policies, how to send feedback and more, please check-out labs.google/fx’s \u003cFaqLink\u003eFAQ\u003c/FaqLink\u003e"},"backbone_faq_section_more_title":{"message":"More"},"backbone_faq_subheader_2":{"message":"Creating with Whisk is simple!"},"backbone_faq_subheader_3":{"message":"What do the categories mean?"},"backbone_faq_subheader_4":{"message":"Tutorials"},"backbone_faq_title":{"message":"Whisk Help Center"},"backbone_faq_watermarking_answer":{"message":"\u003cp\u003eAll outputs generated in Whisk using Veo and Imagen include invisible \u003ca\u003eSynthID\u003c/a\u003e watermarks. SynthID identifies AI-generated content by embedding digital watermarks directly into AI-generated content.\u003c/p\u003e\u003cp\u003eAs an additional step to help people identify AI-generated content, Animate videos generated in Whisk will contain a visible watermark indicating the content was made with Veo.\u003c/p\u003e"},"backbone_faq_watermarking_question":{"message":"Will my generations contain a watermark?"},"backbone_faq_what_gets_shared_answer":{"message":"\u003cp\u003eThe share link will display:\u003c/p\u003e\u003cul\u003e\u003cli\u003eThe recipe for your creation.\u003c/li\u003e\u003cli\u003eA standalone image of your creation.\u003c/li\u003e\u003cli\u003eOptionally, the ingredients (assets) used in your creation.\u003c/li\u003e\u003c/ul\u003e"},"backbone_faq_what_gets_shared_question":{"message":"What gets shared when I create a share link?"},"backbone_faq_what_is_precise_mode_answer":{"message":"\u003cp\u003ePrecise mode is a new feature in Whisk that allows you to generate images using direct reference images you upload.\u003c/p\u003e\u003cp\u003eThe standard Whisk experience, now referred to as “Creative mode,” sends your images to  Gemini which uses visual understanding to caption your images and then passes them into the image model. In contrast, the new Precise mode feature, which uses a specialized version of Imagen 4 designed to adhere to character, style, and scene references, directly uses your uploaded image for more precise outputs. Then, we leverage native image editing from Gemini 2.5 Flash in our refine function to get your images just right. \u003c/p\u003e\u003cp\u003eExample of each method using the same inputs: \u003c/p\u003e\u003cp\u003eCreative Mode: \u003cCreativeMode /\u003e\u003c/p\u003e\u003cp\u003ePrecise Mode: \u003cPreciseMode /\u003e\u003c/p\u003e"},"backbone_faq_what_is_precise_mode_question":{"message":"What is “Precise mode”?"},"backbone_faq_where_available_content_with_i18n":{"message":"\u003cp\u003eWe’re working to bring our tools to as many people as possible. See below for a list of countries the site is currently available in.\u003c/p\u003e\u003cp\u003eAmerican Samoa, Angola, Antigua and Barbuda, Argentina, Australia, Bahamas, Barbados, Belize, Benin, Bhutan, Bolivia, Botswana, Brazil, Brunei, Burkina Faso, Burundi, Cabo Verde, Cambodia, Cameroon, Canada, Central African Republic, Chile, Christmas Island, Cocos (Keeling) Islands, Colombia, Congo-Brazzaville Republic of the Congo, Congo-Kinshasa Democratic Republic of the Congo, Cook Islands, Costa Rica, Côte d'Ivoire, Dominica, Dominican Republic, Ecuador, El Salvador, Equatorial Guinea, Eswatini, Ethiopia, Fiji, Gabon, Ghana, Grenada, Guam, Guatemala, Guinea, Guyana, Heard Island and McDonald Islands, Honduras, Jamaica, Japan, Kenya, Kiribati, Laos, Lesotho, Liberia, Madagascar, Malawi, Malaysia, Mali, Mauritius, Mexico, Micronesia, Mozambique, Namibia, Nauru, Nepal, New Zealand, Nicaragua, Niger, Nigeria, Niue, Norfolk Island, Northern Mariana Islands, Pakistan, Palau, Panama, Papua New Guinea, Paraguay, Peru, Philippines, Puerto Rico, Rwanda, Saint Kitts and Nevis, Saint Lucia, Saint Vincent and the Grenadines, Samoa, São Tomé and Príncipe, Senegal, Seychelles, Sierra Leone, Singapore, Solomon Islands, South Africa, South Korea, South Sudan, Sri Lanka, Tanzania, The Gambia, Tokelau, Tonga, Trinidad and Tobago, Türkiye, Tuvalu, U.S., U.S. Virgin Islands, Uganda, Uruguay, Vanuatu, Venezuela, Zambia, and Zimbabwe.\u003c/p\u003e\u003cp\u003eWhisk is not available in the UK\u003c/p\u003e\u003cp\u003eFor best results with Whisk, we recommend using English prompts. While some of our features may support prompts in other languages, the quality of the generated output may vary depending on the language and complexity of the prompt.\u003c/p\u003e"},"backbone_faq_who_can_see_shared_answer":{"message":"Anyone who has the share link can view your creation. It's not possible to restrict access to specific accounts."},"backbone_faq_who_can_see_shared_question":{"message":"Who can see my shared creation?"},"backbone_favorite_a11y_label":{"message":"Favorite image"},"backbone_favorite_empty_view_subtitle":{"message":"Tap the heart icon on your favorite images for them to appear here"},"backbone_favorite_empty_view_title":{"message":"No favorites here yet"},"backbone_favorite_label":{"message":"Favorite"},"backbone_file_upload_error_size":{"message":"Reduce image size to smaller than {{size}}."},"backbone_file_upload_error_type":{"message":"Unsupported image format. Please upload a: {{files}}."},"backbone_flag_label":{"message":"Flag image"},"backbone_gallery_card_animate_subtitle":{"message":"Try swapping an asset and add some motion!"},"backbone_gallery_card_animate_title":{"message":"\u003cstrong\u003eNew!\u003c/strong\u003e Animate your creation"},"backbone_gallery_card_start_animating_button_text":{"message":"Start animating"},"backbone_gem_pix_2_dialog_body":{"message":"\u003cp\u003eIt’s here! Google’s latest and greatest image generation and editing model. This model is known to shine with:\u003c/p\u003e\u003cul\u003e\u003cli\u003eBetter character consistency\u003c/li\u003e\u003cli\u003eHandling up to 10 references\u003c/li\u003e\u003cli\u003eIncreased precision and control\u003c/li\u003e\u003cli\u003eAdvanced text rendering\u003c/li\u003e\u003c/ul\u003e\u003cp\u003eFor Paid Plan Users: Access this model instantly for both generation and editing tasks! \u003cstrong\u003eNano Banana Pro is now the default when you toggle on Precise Mode\u003c/strong\u003e in your creation panel.\u003c/p\u003e\u003cp\u003e\u003ci\u003eDue to high demand, you may temporarily revert to the regular Nano Banana model after a certain number of daily generations as we stabilize capacity.\u003c/i\u003e\u003c/p\u003e"},"backbone_gem_pix_2_dialog_close_button":{"message":"Try now"},"backbone_gem_pix_2_dialog_tite":{"message":"Introducing… 🍌Nano Banana Pro !"},"backbone_gem_pix_2_switch_models_toast":{"message":"You've exhausted your Nano Banana Pro quota for the day, defaulting back to Nano Banana."},"backbone_generate_button":{"message":"Generate"},"backbone_generate_image_title":{"message":"Generate Image"},"backbone_generate_wait_message":{"message":"Please wait. Loading requested images."},"backbone_hide_ingredients_button":{"message":"Hide ingredients"},"backbone_image_edit_modal_input_placeholder":{"message":"Enter your image generation prompt…"},"backbone_image_fetch_failure_message":{"message":"We are having trouble fetching your images. Please try again later!"},"backbone_ingredients_title":{"message":"ingredients"},"backbone_inspire_gallery_text":{"message":"Get inspired!"},"backbone_is_original_label":{"message":"Initial image"},"backbone_landing_add_image":{"message":"Add your own image"},"backbone_landing_drag_image":{"message":"Try to drag an image!"},"backbone_landing_drop_image":{"message":"Drop an image here"},"backbone_landing_error":{"message":"Error: Please upload a different image and try again."},"backbone_landing_label_drop_down":{"message":"Make a"},"backbone_landing_open_tool_button":{"message":"Open in Tool"},"backbone_landi 03cstrong\u003eTerms\u003c/strong\u003e”). To the extent any of the above terms of service conflict with these Additional Terms, these Additional Terms will govern. \u003c/p\u003e \u003ch3\u003eTesting Program\u003c/h3\u003e \u003cp\u003e By accepting these Terms, you agree to participate in Google’s testing and development program(s) (each, a “\u003cstrong\u003eTesting Program\u003c/strong\u003e”) to help Google improve its products for you and other Google users. This may include giving you access to certain pre-release products that are not yet suitable for use in a production environment, including but not limited to the Whisk generative AI image creation pre-release product (each, a \u003cstrong\u003e“Test Product”\u003c/strong\u003e). If you choose to participate under these Terms, Google may contact you (including by email or phone) regarding the Testing Program. You will use one or more tools in the Test Product for at least one week during the Testing Program, and you may be asked to complete approximately one survey for each tool. You may be selected to participate in a user interview, and you agree to participate in such an interview if selected. Google will not provide any compensation for your participation in the Testing Program. \u003c/p\u003e \u003ch3\u003eAge Restrictions\u003c/h3\u003e \u003cp\u003eYou must be 18 years of age or older to use the Test Product.\u003c/p\u003e \u003ch3\u003eUse Restrictions\u003c/h3\u003e \u003cp\u003e During the Testing Program, you may only use the Test Product, including any output generated, within the United States, to test the Test Product in accordance with these Terms, and provide Feedback to Google (collectively, the “\u003cstrong\u003ePurpose\u003c/strong\u003e”). You may not under any circumstances use the Test Product for any other purpose, including but not limited to: (1) distribute any tools integrated with the Test Product; (2) distribute or provide any third parties with access (directly or indirectly) to the Test Product or its outputs (e.g., share prompts or prompt responses such as generated images) or copies or screenshots of such output; (3) use the Test Product in connection with any high-risk activities (including but not limited to, any prompts on political topics, violence, children, or pornography); (4) use the Test product to develop products or services that compete with Google’s products and services; (5) misuse or reverse engineer the Test Product in any way; or (6) use the Test Product to extract or replicate the underlying models (e.g., parameter weights). \u003cstrong \u003eDo not enter in the Test Product any confidential information, or any data you do not intend Google to access or use to improve its products, including its machine-learning technologies. \u003c/strong\u003e The Test Product includes safety features to block harmful content. You may not attempt to circumvent those safety features or generate or use content that violates these Terms. The Test Product is an experimental technology and may give inaccurate or inappropriate information that does not represent Google’s views. \u003c/p\u003e \u003ch3\u003eFeedback\u003c/h3\u003e \u003cp\u003e You give Google permission to contact you for feedback, such as suggestions to improve the Test Product (“\u003cstrong\u003eFeedback\u003c/strong\u003e”). Your Feedback must (A) be truthful; (B) originate only from you; and (C) not contain any third party’s confidential information. You grant Google a perpetual, irrevocable, non-exclusive, worldwide, sublicenseable, royalty-free, fully paid-up license to: (1) reproduce, distribute, create derivative works based on, publicly perform, publicly display, and otherwise use your Feedback; and (2) make, have made, import, use, have used, offer for sale, sell, lease, license, and otherwise exploit products and services (including combinations) that incorporate your Feedback. \u003c/p\u003e \u003ch3\u003eConfidentiality\u003c/h3\u003e \u003cp\u003e “\u003cstrong\u003eGoogle Confidential Information\u003c/strong\u003e” means all information that Google discloses to you in connection with the Testing Program, including without limitation, the Test Product, the Test Product website, tools, documentation, outputs, and any other materials or information provided by Google related to the Testing Program, that is marked as confidential or would normally be considered confidential under the circumstances. You will not disclose Google Confidential Information to any third party, except as allowed by the Google Terms of Services (i.e., with Google’s prior written consent or as required by law). You will use Google Confidential Information only to fulfill the Purpose under these Terms. Additionally, you may not make any public statement regarding these Additional Terms, the Test Product, or the Testing Program without Google’s prior written approval. \u003c/p\u003e \u003ch3\u003eData Protection\u003c/h3\u003e \u003cp\u003e Google may use and share personal information that you provide to operate the applicable Testing Program and exercise Google’s rights, subject to Google’s then-current AI Test Kitchen Privacy Policy at https://aitestkitchen.withgoogle.com/privacy (or such other URL as Google may provide). \u003c/p\u003e \u003ch3\u003ePromotional and Marketing Use\u003c/h3\u003e \u003cp\u003e In the course of promoting, marketing, or demonstrating the Test Product, Google may produce and distribute incidental depictions, including screenshots, images, or other content from your interactions with the Test Product. You grant us all necessary rights for the above purposes. \u003c/p\u003e \u003ch3\u003eUse of Generated Content\u003c/h3\u003e \u003cp\u003e You’ll comply with all applicable law in using any generated content in the Testing Program. \u003c/p\u003e \u003ch3\u003eTermination\u003c/h3\u003e \u003cp\u003e These Terms will automatically expire upon the conclusion of the Testing Program, and either party may earlier termi nie, human reviewers read, annotate, and process your Genie interactions and tool outputs. We take steps to protect your privacy as part of this process. This includes disconnecting your conversations, interactions and tool outputs from your Google Account before reviewers see or annotate them. \u003cstrong\u003ePlease don’t enter confidential information in your conversations or interactions or any data you wouldn’t want a reviewer to see or Google to use to improve our products, services, and machine-learning technologies.\u003c/strong\u003e\u003c/p\u003e\n\u003cp\u003eGenie is an experimental technology that can make mistakes, so double-check it.\u003c/p\u003e"},"bottle_pro_access_description":{"message":"\u003cp\u003eProject Genie is an early research prototype available with Google AI Ultra plans, and with AI Pro plans through June 30, 2026. \u003ca\u003eLearn more\u003c/a\u003e\u003c/p\u003e\u003cp\u003eCheck back periodically for updates on broader availability in the future.\u003c/p\u003e"},"bottle_prompt_guide_menu_item":{"message":"Prompt guide"},"bottle_queue_position_message":{"message":"Your world is #\u003cstrong\u003e{{position}}\u003c/strong\u003e in the queue"},"bottle_queue_position_subtitle":{"message":" We’ll notify you once it’s ready, and you’ll have {{duration}} seconds to enter your world"},"bottle_queue_ready_message":{"message":"Your world is ready for creation"},"bottle_queue_rejoin":{"message":"Rejoin the queue"},"bottle_queue_timeout":{"message":"The time to enter your world ran out"},"bottle_queue_very_long_subtitle":{"message":"Tip: Come back during off-peak hours (10pm ET to 9am ET) for faster wait times"},"bottle_randomize_button_tooltip_text":{"message":"Explore a surprise world"},"bottle_redirect_to_creation_message":{"message":"World cannot be created without an image input, redirecting to creation page…"},"bottle_report_button_tooltip_text":{"message":"Report"},"bottle_report_dialog_description":{"message":"Project Genie is still s, royalties, and/or other payments, and no third party has any rights in, to or arising out of Collaborator’s Background IP;\u003c/div\u003e\u003cdiv\u003eiii. with respect to any content or Intellectual Property that Collaborator does not own that it contributes to the Project: (a) Collaborator will identify any such content, and (b) Collaborator has and will retain all necessary rights to grant the rights, permissions, and licenses in this Agreement without any additional fees, royalties, and/or other payments by Google to Collaborator or any third party; and\u003c/div\u003e\u003cdiv\u003eiv. Google may exploit, as permitted under this Agreement, any tattoos or body art that are visible as part of any Likeness without obtaining further consents from, or making payments to, the artists of such tattoos or body art.\u003c/div\u003e\u003cdiv\u003ec. THE PARTIES’ ONLY REPRESENTATIONS AND WARRANTIES UNDER THIS AGREEMENT ARE EXPRESSLY SET OUT IN THIS SECTION 11 (REPRESENTATIONS AND WARRANTIES; DISCLAIMERS). TO THE MAXIMUM EXTENT PERMITTED BY APPLICABLE LAW, GOOGLE MAKES NO REPRESENTATION OR WARRANTY OF ANY KIND WITH RESPECT TO GOOGLE’S OR ANY OF ITS AFFILIATES’ PRODUCTS AND SERVICES, WHETHER IMPLIED, STATUTORY, OR OTHERWISE, AND DISCLAIMS, WITHOUT LIMITATION, WARRANTIES OF MERCHANTABILITY, FITNESS FOR A PARTICULAR USE, AND NON-INFRINGEMENT. THE PARTIES ACKNOWLEDGE AND AGREE THAT GOOGLE’S AND GOOGLE AFFILIATES’ PRODUCTS AND SERVICES AND ANY RESULTS THEREOF ARE PROVIDED “AS IS.”\u003c/div\u003e\u003cdiv\u003e\u003cb\u003e12. Indemnities.\u003c/b\u003e Collaborator will indemnify and hold Google and its affiliates harmless from and against any and all claims, damages, liabilities, costs and expenses (including reasonable attorneys’ fees) arising out of or relating to: (a) Collaborator’s material breach of this Agreement; and (b) Collaborator’s unauthorized use of the AI Tools.\u003c/div\u003e\u003cdiv\u003e\u003cb\u003e13. Limitation of Liability.\u003c/b\u003e COLLABORATO 003c/div\u003e\u003cdiv\u003ed. \u003cb\u003eEffect of termination.\u003c/b\u003e On expiration or termination of this Agreement for any reason (contractual or otherwise), Sections 5.a., 6, 7, and 10 through 18 and (and any other sections that under their terms or by implication ought to survive) will survive.\u003c/div\u003e\u003cdiv\u003e\u003cb\u003e16. Independent Contractor.\u003c/b\u003e This Agreement does not render Collaborator an employee, partner, agent of, or joint venturer with Google for any purpose. Collaborator is and will each remain an independent contractor in their relationship with Google under this Agreement, having no authority to bind Google.\u003c/div\u003e\u003cdiv\u003e\u003cb\u003e17. Notices.\u003c/b\u003e All notices of breach must be in writing and addressed to the other party’s Legal Department. The address for notices to Google’s Legal Department is legal-notices@google.com. All other notices must be in writing and addressed to the other party’s primary contact. Notice will be treated as given on receipt, as verified by written or automated receipt, or by electronic log (as applicable).\u003c/div\u003e\u003cdiv\u003e\u003cb\u003e18. Miscellaneous.\u003c/b\u003e CALIFORNIA LAW, EXCLUDING CALIFORNIA’S CHOICE OF LAW RULES, WILL GOVERN ALL CLAIMS ARISING OUT OF OR RELATING TO THIS AGREEMENT (COLLECTIVELY, “CLAIMS”). ALL CLAIMS WILL BE LITIGATED EXCLUSIVELY IN THE FEDERAL OR STATE COURTS OF SANTA CLARA COUNTY, CALIFORNIA, USA, AND THE PARTIES CONSENT TO PERSONAL JURISDICTION IN THOSE COURTS. Collaborator may not assign its rights, or delegate or subcontract its obligations under this Agreement, by law or otherwise, without the prior written consent of Google (email suffices), and any other attempt to transfer or assign is void. Collaborator will remain liable for all subcontracted obligations and all acts or omissions of its subcontractors. Failure to enforce any provision in this Agreement will not constitute a waiver. If any provision is found unenforceable, the balance of this Agreement will remain in full force and effect. This Agreement is the parties’ entire agreement relating to its subject matter and supersedes any prior or contemporaneous agreements. The parties may execute this Agreement in counterparts, including PDF, and other electronic copies, which taken together will constitute one instrument.\u003c/div\u003e"},"cpp_tos_intro_paragraph":{"message":"\u003cp\u003eThis Collaboration Agreement (\"\u003cb\u003eAgreement\u003c/b\u003e\") is entered into by Google LLC, located at 1600 Amphitheatre Parkway, Mountain View, CA 94043 (\"\u003cb\u003eGoogle\u003c/b\u003e\") and the entity or person agreeing to these terms (\"\u003cb\u003eCollaborator\u003c/b\u003e\"), and is effective as of the date Collaborator signs it (\"\u003cb\u003eEffective Date\u003c/b\u003e\"). Google and Collaborator agree on the following:\u003c/p\u003e\u003cp\u003e(i) Collaborator will engage with Google in connection with the use of artificial intelligence tools and capabilities, including Google’s video generation model features (the “\u003cb\u003eAI Tools\u003c/b\u003e”), and utilize the AI Tools in accordance with this Agreement to develop Collaborator’s Content and potentially have it displayed in Google’s social media channels, screenings, marketing events, and at Google’s events, in Google’s discretion (“\u003cb\u003eProject\u003c/b\u003e”); and\u003c/p\u003e\u003cp\u003e(ii) Collaborator will participate in upskilling workshops, meet their cohorts, and join mentor office hours relevant to the Project during the Term; and\u003c/p\u003e\u003cp\u003e(iii) Collaborator will promote the completed Collaborator’s Content and the Project on Collaborator’s channels subject to this Agreement.\u003c/p\u003e\u003cp\u003eIn this Agreement, “include” or “including” means “including but not limited to.”\u003c/p\u003e"},"cpp_tos_subtitle":{"message":"(Labs Flow Sessions)"},"cpp_tos_title":{"message":"Collaboration Agreement"},"create_applet_add_attachment_label":{"message":"Add attachment"},"create_applet_credits_disclaimer":{"message":"Creating tools does not currently cost credits."},"create_applet_hero_title":{"message":"Start building any creative tool\u003cbr /\u003eyou can dream by describing it below."},"create_applet_model_selector":{"message":"Gemini 3 Fast"},"create_applet_more_options_label":{"message":"More options"},"create_applet_new_tool_title":{"message":"New {{tool}}"},"create_applet_prompt_placeholder":{"message":"Build a retro pixel effect app with a large upload drop zone and a settings sidebar."},"create_applet_submit_label":{"message":"Create tool"},"create_applet_suggestion_image_filter_description":{"message":"Explore different styles of your images"},"create_applet_suggestion_image_filter_name":{"message":"Image Filter"},"create_applet_suggestion_image_filter_prompt":{"message":"Make an image filter app that has a central image preview with a carousel of filter options such as grayscale, soft focus, invert, hue shift, and more. A right panel should display the name of the filter selected along with a single slider that pertains to filter intensity or color hue target etc."},"create_applet_suggestion_style_morph_description":{"message":"Use preset styles to reimagine your image"},"create_applet_suggestion_style_morph_name":{"message":"Style Morph"},"create_applet_suggestion_style_morph_prompt":{"message":"Create an app where I can pick an image from my gallery, apply a style transfer (e.g., \"oil painting\" or \"anime\" + several more) with nano banana. Show the result in a before and after comparison with a slider that reveals the new image underneath the original. Keep the generations handy as I explore other versions so I can go back and forth."},"create_applet_suggestion_time_stretcher_description":{"message":"Change video frame rate and clip speed"},"create_applet_suggestion_time_stretcher_name":{"message":"Time Stretcher"},"create_applet_suggestion_time_stretcher_prompt":{"message":"Build a simple video manipulation tool called 'TimeStretch' that allows users to upload a video and manipulate its playback in real-time. The interface should feature a professional workspace layout with a large video viewport on the left and a dedicated controls panel on the right. Key features must include a live playback speed slider (0.1x to 10.0x), a custom frame rate slider (1 fps to 60 fps) that visually creates a stop-motion effect, and an interactive timeline below the video that allows users to scrub through the footage and drag handles to trim the start and end points of the looping clip. The aesthetic should be minimal, subtle gray borders, technical uppercase typography for labels, and monospace fonts for values. There should be an export video to grid button, that exports the stretched video to the media grid."},"create_applet_suggestion_voice_over_description":{"message":"Record your voice over a video"},"create_applet_suggestion_voice_over_name":{"message":"Voice Over"},"create_applet_suggestion_voice_over_prompt":{"message":"Create a minimalist voiceover studio app that uses deep blacks, monospace typography, and red accents. The interface should feature a main media preview area for imported videos or images, sitting above a sleek, zoomable two-track timeline for media and voice. Users can scrub the timeline with a precise playhead and use a prominent record button to capture microphone audio, which instantly appears as a synced clip on the voice track. To ensure clean recordings, the app must automatically mute existing audio while recording, and users should be able to easily delete unwanted clips directly from the timeline. Add a button to export to media grid and a button to download clip"},"create_applet_untitled_app":{"message":"Untitled App"},"creating_your_video_msg":{"message":"Creating your video…"},"credit_fetch_fail_toast_text":{"message":"Couldn't load your credits. Please try again later."},"credits_go_furth we hope you find it"},"error_500":{"message":"ERROR: 500"},"error_500_go_to_home":{"message":"Home"},"error_500_helper_message":{"message":"Something went wrong."},"error_share_link":{"message":"There was a system error. Try copying the link again."},"error_subheading":{"message":"Your creativity beckons…"},"error_unsupported_country_cta":{"message":"Get notified"},"error_webview_copy_url":{"message":"Copy URL"},"error_webview_helper_message":{"message":"FX is not supported in this application's browser. Please copy and paste the url in your native browser. Chrome, Safari, Firefox, and Edge are supported."},"error_webview_title":{"message":"Unsupported browser"},"error_webview_url_copied":{"message":"URL Copied"},"error_worthy_of_refresh":{"message":"Something went wrong. Refresh the page to try again."},"faq_accordion_current_policies_content":{"message":"\u003cp\u003eWe want the labs.google/fx experience to be safe, fun, and educational. Therefore, we prohibit users from knowingly generating \u003ca href=\"https://policies.google.com/terms/generative-ai/use-policy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ecertain categories of content\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eMusicFX and MusicFX DJ features precautions to protect artist voices and styles so certain queries that mention specific artists or include vocals will not be generated. \u003c/p\u003e\u003cp\u003eImageFX, Flow and Whisk feature precautions to protect minors so certain queries that could lead to outputs of children will not be generated.\u003c/p\u003e\u003cp\u003eAs labs.google/fx evolves, this policy may change with limited notice so that we can maintain a safe user experience. If we believe repeated violations of policy have occurred, it may result in an account being suspended. \u003c/p\u003e"},"faq_accordion_current_policies_content_tool_removal_update":{"message":"\u003cp\u003eWe want the labs.google/fx experience to be safe, fun, and educational. Therefore, we prohibit users from knowingly generating \u003ca href=\"https://policies.google.com/terms/generative-ai/use-policy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ecertain categories of content\u003c/a\u003e.\u003c/p\u003e\u003cp\u003eMusicFX and MusicFX DJ features precautions to protect artist voices and styles so certain queries that mention specific artists or include vocals will not be generated. \u003c/p\u003e\u003cp\u003eAs labs.google/fx evolves, this policy may change with limited notice so that we can maintain a safe user experience. If we believe repeated violations of policy have occurred, it may result in an account being suspended. \u003c/p\u003e"},"faq_accordion_current_policies_title":{"message":"What are the labs.google/fx content policies?"},"faq_accordion_google_legal_bases_uk_data_processing_content":{"message":"\u003cp\u003eIf United Kingdom (UK) data protection law applies to the processing of your information, please read the below carefully.\u003c/p\u003e\u003cp\u003eWhen you use labs.google/fx, Google processes your information for the purposes, and on the legal grounds, described below.\u003c/p\u003e\u003cp\u003eWhen we refer to “your labs.google/fx information” below we mean all of the following: (i) your labs.google/fx interactions, (ii) tool outputs, (iii) related product usage information; and (iv) your feedback. \u003c/p\u003e\u003cp\u003eGoogle's legal bases are:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003ePerformance of a contract.\u003c/strong\u003e We process your labs.google/fx information so that we can provide and maintain the labs.google/fx service you have requested under the \u003ca href=\"https://policies.google.com/terms\"\u003eGoogle Terms of Service\u003c/a\u003e. For example, we process your labs.google/fx information to provide outputs in response to your interactions, and to provide various labs.google/fx features and functionalities such as image generation. \u003c/li\u003e\u003cli\u003e\u003cstrong\u003eGoogle and third parties' legitimate interests with appropriate safeguards to protect your privacy.\u003c/strong\u003e\u003cul\u003e\u003cli\u003eWe process information from publicly accessible sources and your labs.google/fx information so that we can provide, maintain, improve, and develop Google products, services, and machine learning technologies. \u003cul\u003e\u003cli\u003eProcessing this information for this purpose is necessary for the legitimate interests of Google and our users in: \u003cul\u003e\u003cli\u003eProviding, maintaining, and improving our services to meet the needs of our users (such as using interactions to fine-tune models and improve labs.google/fx outputs for safety and accuracy). \u003c/li\u003e\u003cli\u003eDeveloping new products and features that are useful for our users (such as training new models to respond to your interactions). \u003c/li\u003e\u003cli\u003eUnderstanding how people use our services to ensure and improve the performance of our services (such as generating metrics to understand how users are using labs.google/fx to better tailor user experience). \u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003eWe also process your labs.google/fx information so that we can maintain the functionality, safety and reliability of labs.google/fx, including by detecting, preventing, and responding to fraud, abuse, security risks, and technical issues that could affect Google, our users, or the public. \u003cul\u003e\u003cli\u003eProcessing this information for this purpose is necessary for the legitimate interests of Google, our users, and the public in: \u003cul\u003e\u003cli\u003eDetecting, preventing, or otherwise addressing fraud, abuse, security, or technical issues with our services (such as fixing bugs and troubleshooting failures). \u003c/li\u003e\u003cli\u003eProtecting against harm to the rights, property, or safety of Google, our users, or the public as required or permitted by law (such as updating safety classifiers and model filters). \u003c/li\u003e\u003cli\u003ePerforming research that improves our services for our users and benefits the public. \u003c/li\u003e\u003cli\u003eEnforcing legal claims, including investigation of potential violations of applicable terms of service (such as reviewing suspicious activity and interactions flagged as problematic). \u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003eProcessing this information for this purpose is also necessary for the legitimate interests of Google and our commercial partners in fulfilling obligations to our partners like developers and rights holders (such as honoring removal requests from intellectual property rights holders). \u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eLegal obligations\u003c/strong\u003e. We’ll also process your labs.google/fx information to meet any applicable law, regulation, legal process, or enforceable governmental request (such as if we get a legal request for information from a governmental authority). \u003c/li\u003e\u003c/ul\u003e"},"faq_accordion_google_legal_bases_uk_data_processing_content_tool_removal_update":{"message":"\u003cp\u003eIf United Kingdom (UK) data protection law applies to the processing of your information, please read the below carefully.\u003c/p\u003e\u003cp\u003eWhen you use labs.google/fx, Google processes your information for the purposes, and on the legal grounds, described below.\u003c/p\u003e\u003cp\u003eWhen we refer to “your labs.google/fx information” below we mean all of the following: (i) your labs.google/fx interactions, (ii) tool outputs, (iii) related product usage information; and (iv) your feedback. \u003c/p\u003e\u003cp\u003eGoogle's legal bases are:\u003c/p\u003e\u003cul\u003e\u003cli\u003e\u003cstrong\u003ePerformance of a contract.\u003c/strong\u003e We process your labs.google/fx information so that we can provide and maintain the labs.google/fx service you h  the public in: \u003cul\u003e\u003cli\u003eDetecting, preventing, or otherwise addressing fraud, abuse, security, or technical issues with our services (such as fixing bugs and troubleshooting failures). \u003c/li\u003e\u003cli\u003eProtecting against harm to the rights, property, or safety of Google, our users, or the public as required or permitted by law (such as updating safety classifiers and model filters). \u003c/li\u003e\u003cli\u003ePerforming research that improves our services for our users and benefits the public. \u003c/li\u003e\u003cli\u003eEnforcing legal claims, including investigation of potential violations of applicable terms of service (such as reviewing suspicious activity and interactions flagged as problematic). \u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003eProcessing this information for this purpose is also necessary for the legitimate interests of Google and our commercial partners in fulfilling obligations to our partners like developers and rights holders (such as honoring removal requests from intellectual property rights holders). \u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003c/ul\u003e\u003c/li\u003e\u003cli\u003e\u003cstrong\u003eLegal obligations\u003c/strong\u003e. We’ll also process your labs.google/fx information to meet any applicable law, regulation, legal process, or enforceable governmental request (such as if we get a legal request for information from a governmental authority). \u003c/li\u003e\u003c/ul\u003e"},"faq_accordion_how_access_data_content":{"message":"Yes, you can review your interactions and tool outputs or delete them at \u003ca href=\"https://labs.google/fx/library\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ehttps://labs.google/fx/library\u003c/a\u003e.  \u003ch4\u003eAbout your labs.google/fx History control\u003c/h4\u003e When you have labs.google/fx history enabled, Google stores your labs.google/fx history (such as your prompts, outputs, and feedback) in your Google Account. \u003cbr/\u003e\u003cbr/\u003e  Even when your labs.google/fx history is off, your interactions will be saved with your account for up to 72 hours to allow us to provide the service and process feedback. This activity will not show up in your labs.google/fx History.  \u003ch4\u003eHow to control \u0026 manage your labs.google/fx History\u003c/h4\u003e In your \u003cLibraryPageLink\u003elabs.google/fx Library\u003c/LibraryPageLink\u003e, you can at any time: \u003cul\u003e\u003cli\u003eDisable labs.google/fx history, by switching off the “Enable library” toggle in the menu\u003c/li\u003e\u003cli\u003eReview your interactions and outputs\u003c/li\u003e\u003cli\u003eDelete any interactions and tool outputs\u003c/li\u003e\u003cli\u003eDelete all of your labs.google/fx history\u003c/li\u003e\u003cli\u003ePublish \u0026 unpublish all of your Labs.google/fx history\u003c/li\u003e\u003c/ul\u003eYou can also \u003ca href='mailto:labs-google-fx-data-export@google.com'\u003eexport your information\u003c/a\u003e, as explained in the \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eGoogle Privacy Policy\u003c/a\u003e and the \u003cPrivacyPageLink\u003elabs.google/fx Privacy Notice\u003c/PrivacyPageLink\u003e. "},"faq_accordion_how_access_data_content_history_update":{"message":"Yes, you can review your interactions and tool outputs or delete them at \u003ca href=\"https://labs.google/fx/library\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ehttps://labs.google/fx/library\u003c/a\u003e.  \u003ch4\u003eAbout your labs.google/fx data control\u003c/h4\u003e When you have labs.google/fx history enabled, Google stores your labs.google/fx history (such as your prompts, outputs, and feedback) in your Google Account. \u003cbr/\u003e\u003cbr/\u003e  Even when your labs.google/fx history is disabled, your interactions will be saved with your account for up to 72 hours to allow us to provide the service and process feedback. This activity will not show up in your labs.google/fx library.  \u003ch4\u003eHow to control \u0026 manage your labs.google/fx data\u003c/h4\u003e In each tool's Library, you can at any time: \u003cul\u003e\u003cli\u003eDisable labs.google/fx history, by switching off the \"Enable history\" toggle in the menu\u003c/li\u003e\u003cli\u003eReview your interactions and outputs\u003c/li\u003e\u003cli\u003eDelete any interactions and tool outputs\u003c/li\u003e\u003cli\u003eDelete all of your labs.google/fx library data by selecting the \"Delete library data\" button in the menu\u003c/li\u003e\u003c/ul\u003eYou can also \u003ca href='mailto:labs-google-fx-data-export@google.com'\u003eexport your information\u003c/a\u003e, as explained in the \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eGoogle Privacy Policy\u003c/a\u003e and the \u003cPrivacyPageLink\u003elabs.google/fx Privacy Notice\u003c/PrivacyPageLink\u003e. "},"faq_accordion_how_access_data_content_splitLibrary":{"message":"Yes, you can review your interactions and tool outputs or delete them at \u003ca href=\"https://labs.google/fx/library\" target=\"_blank\" rel=\"noopener noreferrer\"\u003ehttps://labs.google/fx/library\u003c/a\u003e.  \u003ch4\u003eAbout your labs.google/fx data control\u003c/h4\u003e When you have labs.google/fx history enabled, Google stores your labs.google/fx history (such as your prompts, outputs, and feedback) in your Google Account. \u003cbr/\u003e\u003cbr/\u003e  Even when your labs.google/fx history is disabled, your interactions will be saved with your account for up to 72 hours to allow us to provide the service and process feedback. This activity will not show up in your labs.google/fx library.  \u003ch4\u003eHow to control \u0026 manage your labs.google/fx data\u003c/h4\u003e In your \u003cLibraryPageLink\u003elabs.google/fx Library\u003c/LibraryPageLink\u003e, you can at any time: \u003cul\u003e\u003cli\u003eDisable labs.google/fx history, by switching off the “Enable history” toggle in the menu\u003c/li\u003e\u003cli\u003eReview your interactions and outputs\u003c/li\u003e\u003cli\u003eDelete any interactions and tool outputs\u003c/li\u003e\u003cli\u003eDelete all of your labs.google/fx library data by selecting the ”Delete library data” button in the menu\u003c/li\u003e\u003c/ul\u003eYou can also \u003ca href='mailto:labs-google-fx-data-export@google.com'\u003eexport your information\u003c/a\u003e, as explained in the \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eGoogle Privacy Policy\u003c/a\u003e and the \u003cPrivacyPageLink\u003elabs.google/fx Privacy Notice\u003c/PrivacyPageLink\u003e. "},"faq_accordion_how_access_data_title":{"message":"Can I access and delete my data?"},"faq_accordion_how_did_you_create_it_content":{"message":"To learn more about the technology powering each tool, open the three dot menu and click on the information icon on the tool pages."},"faq_accordion_how_did_you_create_it_title":{"message":"How did you create it?"},"faq_accordion_how_does_it_work_content":{"message":"\u003cp\u003e18+ users in our launched countries can try out our 3 tools: ImageFX, MusicFX and now \u003ca href=\"https://labs.google/fx/tools/whisk/faq\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eWhisk!\u003c/a\u003e\u003c/p\u003e\u003cp\u003eEarly access users can also get a sneak peek into our newest video product - Flow.\u003c/p\u003e\u003cp\u003eWith these tools, you can use text to turn an idea into images, music and video.\u003c/p\u003e\u003cp\u003eWhen you use these tools, you'll see generative AI technology firsthand. Keep in mind that this technology has its own set of challenges since the responses can be inaccurate or inappropriate. We've added multiple layers of protection to minimize these risks, but we haven't eliminated them.\u003c/p\u003e"},"faq_accordion_how_does_it_work_content_tool_removal_update":{"message":"\u003cp\u003e18+ users in our launched countries can try out our 2 tools: Project Genie and MusicFX.\u003c/p\u003e\u003cp\u003eWith these tools, you can use text to turn an idea into music and interactive worlds.\u003c/p\u003e\u003cp\u003eWhen you use these tools, you'll see generative AI technology firsthand. Keep in mind that this technology has its own set of challenges since the responses can be inaccurate or inappropriate. We've added multiple layers of protection to minimize these risks, but we haven't eliminated them.\u003c/p\u003e"},"faq_accordion_how_does_it_work_title":{"message":"How does it work?"},"faq_accordion_how_to_create_content":{"message":"\u003cp\u003elabs.google/fx is a place where people can experience and give feedback on some of Google's latest AI technologies. Our goal is to learn, improve, and innovate responsibly on AI together. Everything is a work in progress and meant for early feedback. In accordance with our AI Principles, we believe responsible progress doesn't happen in isolation. We must give people an opportunity to experience the technology first hand so we can learn and improve it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant Note\u003c/strong\u003e You must be 18 years of age or older to use Labs.google/fx and all of its tools (ImageFX, MusicFX, Whisk, and Flow).\u003c/p\u003e"},"faq_accordion_how_to_create_content_history_update":{"message":"\u003cp\u003elabs.google/fx is a place where people can experience and give feedback on some of Google's latest AI technologies. Our goal is to learn, improve, and innovate responsibly on AI together. Everything is a work in progress and meant for early feedback. In accordance with our AI Principles, we believe responsible progress doesn't happen in isolation. We must give people an opportunity to experience the technology first hand so we can learn and improve it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant Note\u003c/strong\u003e You must be 18 years of age or older to use Labs.google/fx and all of its tools (Project Genie, ImageFX, MusicFX, Whisk, and Flow).\u003c/p\u003e"},"faq_accordion_how_to_create_content_tool_removal_update":{"message":"\u003cp\u003elabs.google/fx is a place where people can experience and give feedback on some of Google's latest AI technologies. Our goal is to learn, improve, and innovate responsibly on AI together. Everything is a work in progress and meant for early feedback. In accordance with our AI Principles, we believe responsible progress doesn't happen in isolation. We must give people an opportunity to experience the technology first hand so we can learn and improve it.\u003c/p\u003e\u003cp\u003e\u003cstrong\u003eImportant Note\u003c/strong\u003e You must be 18 years of age or older to use Labs.google/fx and all of its tools (Project Genie and MusicFX).\u003c/p\u003e"},"faq_accordion_how_to_create_title":{"message":"Why did you create it?"},"faq_accordion_how_to_export_content":{"message":"If you want to back up your labs.google/fx data or use it with a service outside of Google, you can request to export a copy of your data by emailing us at \u003ca href='mailto:ai-test-kitchen-data-export@google.com'\u003eai-test-kitchen-data-export@google.com\u003c/a\u003e."},"faq_accordion_how_to_export_title":{"message":"How do I export a copy of my labs.google/fx data?"},"faq_accordion_how_to_remove_data_content":{"message":"You can \u003ca href=\"https://support.google.com/legal/answer/3110420\" target=\"_blank\" rel=\"noopener noreferrer\"\u003erequest\u003c/a\u003e for the removal of content under our policies or applicable laws."},"faq_accordion_how_to_remove_data_title":{"message":"What should I do if I want content removed from labs.google/fx?"},"faq_accordion_human_review_content":{"message":"\u003ch4\u003eHow human review helps improve models\u003c/h4\u003e Google uses interactions and tool outputs (as well as feedback and related data) from labs.google/fx users to improve Google products, so we can make them safer, more helpful, and work better for all users. Human review is a necessary step of the model improvement process. Through their review, rating, and rewrites, humans help enable quality improvements of generative machine-learning models like the ones that power Gemini Apps. \u003ch4\u003eHow we protect your privacy in this process\u003c/h4\u003e We take a number of precautions to protect your privacy during this human review process: Interactions and tool outputs (as well as feedback and related data) that reviewers see and annotate are not associated with any user accounts. \u003ch4\u003eHow the process works\u003c/h4\u003e Our trained reviewers look at conversations to assess if labs.google/fx tool outputs are low-quality, inaccurate, or harmful. From there, trained evaluators suggest higher-quality responses. These are then used to create a better dataset for generative machine-learning models to learn from so our models can produce improved responses in the future."},"faq_accordion_human_review_title":{"message":"Why is human review of my labs.google/fx interactions, tool outputs, feedback and related data required?"},"faq_accordion_quota_limit_content":{"message":"To ensure everyone can try out our tools, each user is limited to a certain number of daily generations. If you’ve hit your limit, try out a different tool or come back the next day."},"faq_accordion_quota_limit_title":{"message":"Why is there a quota limit?"},"faq_accordion_share_feedback_content":{"message":"You can give feedback by clicking the flag icon or thumbs up and down to make labs.google/fx better. \u003cbr/\u003e\u003cbr/\u003eIf you decide to send feedback to Google, Google’s system collects your feedback, any content you include, and context that helps us better understand your feedback, such as the prompt associated with the content you included."},"faq_accordion_share_feedback_title":{"message":"How can I share feedback?"},"faq_accordion_supported_languages_content":{"message":"Our tools are currently only available in English."},"faq_accordion_supported_languages_content_with_i18n":{"message":"\u003cp\u003eSee below for a list of languages the site is currently available in.\u003c/p\u003e\u003cp\u003eArabic, Bulgarian, Catalan, Chinese, Croatian, Czech, Danish, Dutch, English, Filipino, Finnish, French, German, Greek, Hebrew, Hindi, Hungarian, Italian, Japanese, Korean, Latvian, Lithuanian, Norwegian, Persian, Polish, Portuguese, Romanian, Russian, Serbian, Slovak, Slovenian, Spanish, Swedish, Thai, Turkish, Ukrainian, and Vietnamese.\u003c/p\u003e\u003cp\u003eFor best results with our tools, we recommend using English prompts. While some of our products may support prompts in other languages, the quality of the generated output may vary depending on the language and complexity of the prompt.\u003c/p\u003e"},"faq_accordion_supported_languages_title":{"message":"What languages does labs.google/fx support?"},"faq_accordion_switch_languages_content":{"message":"You can update your preferred language in your \u003ca href=\"https://support.google.com/accounts/answer/32047\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eGoogle Account settings\u003c/a\u003e."},"faq_accordion_switch_languages_title":{"message":"How can I switch between languages?"},"faq_accordion_terms_of_use_content":{"message":"The \u003cTermsOfUseLink\u003eTerms of Service\u003c/TermsOfUseLink\u003e govern how these tools may be used, and must be consulted and followed in their entirety. Per those terms: Some of our services allow you to generate original content. Google won't claim ownership over that content."},"faq_accordion_terms_of_use_title":{"message":"Can I use outputs of these tools for commercial purposes?"},"faq_accordion_uk_data_processing_law_title":{"message":"What are Google’s legal bases for processing labs.google/fx data under United Kingdom data protection law?"},"faq_accordion_what_is_collected_content":{"message":"\u003ch4\u003eWhat data is collected\u003c/h4\u003e \u003cp\u003eWhen you interact with the tools, Google collects your interactions, tool outputs, related product usage information, and your feedback.\u003c/p\u003e \u003cp\u003eFor more details, read the \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eGoogle Privacy Policy\u003c/a\u003e and the \u003cPrivacyPageLink\u003elabs.google/fx Privacy Notice\u003c/PrivacyPageLink\u003e.\u003c/p\u003e \u003ch4\u003eHow Google uses this data\u003c/h4\u003e \u003cp\u003eThis data helps us provide, improve, and develop Google products, services, and machine-learning technologies, like those that power labs.google/fx. For more details, read the \u003ca href=\"https://policies.google.com/privacy\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eGoogle Privacy Policy\u003c/a\u003e and the \u003cPrivacyPageLink\u003elabs.google/fx Privacy Notice\u003c/PrivacyPageLink\u003e.\u003c/p\u003e \u003cp\u003eFor example, we review your feedback and use it to help make labs.google/fx safer. We also use it to help reduce common problems with generative machine-learning models.\u003c/p\u003e \u003cp\u003eYou can learn about how we keep your data private, safe, and secure in \u003ca href=\"https://safety.google/principles\" target=\"_blank\" rel=\"noopener noreferrer\"\u003eGoogle’s privacy principles\u003c/a\u003e.\u003c/p\u003e"},"faq_accordion_what_is_collected_title":{"message":"What data is collected? How is it used?"},"faq_accordion_where_available_content":{"message":"Our tools are currently available to users in the following countries and regions: US, Kenya, New Zealand, and Australia."},"faq_accordion_where_available_content_tool_removal_update":{"message":"\u003cp\u003eWe’re working to bring our tools to as many people as possible. See below for a list of countries the site is currently available to 18+ users in.\u003c/p\u003e\u003cp\u003eAmerican Samoa, Angola, Antigua and Barbuda, Argentina, Australia, B
